<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>هدهد برو - النظام السحابي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap');
        * { font-family: 'Tajawal', sans-serif; }
        .tab-active { background-color: #d97706 !important; color: white !important; }
        .loader { border-top-color: #d97706; animation: spinner 1s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-slate-50 pb-24">

<div id="authOverlay" class="fixed inset-0 z-[2000] bg-white flex items-center justify-center p-6">
    <div id="loginCard" class="max-w-md w-full text-center p-10 bg-white rounded-[3rem] shadow-2xl border border-amber-100">
        <div class="text-7xl mb-6">🦅</div>
        <h1 class="text-3xl font-black text-amber-900 mb-2">مرحباً بك في هدهد</h1>
        <p class="text-slate-500 mb-8 font-medium">نظام إدارة مبيعات "هدهد ماركت" السحابي</p>
        
        <button onclick="loginWithGoogle()" class="w-full flex items-center justify-center gap-4 bg-white border-2 border-slate-100 hover:border-amber-500 p-4 rounded-2xl transition-all font-bold text-slate-700 shadow-sm active:scale-95">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="22">
            تسجيل الدخول بجوجل
        </button>
        <p class="mt-6 text-[11px] text-amber-600 font-bold">🎁 هدية: يومين تجريبيين عند التسجيل لأول مرة</p>
    </div>
    
    <div id="appLoader" class="hidden flex flex-col items-center">
        <div class="loader ease-linear rounded-full border-4 border-t-4 border-gray-200 h-12 w-12 mb-4"></div>
        <p class="text-amber-800 font-bold">جاري الاتصال بالسحابة...</p>
    </div>
</div>

<div id="mainAppContainer" class="hidden">
    <div class="max-w-4xl mx-auto px-4 py-4">
        <div class="flex justify-between items-center mb-6 bg-white p-4 rounded-2xl shadow-sm border border-amber-50">
            <div>
                <h1 class="text-2xl font-black text-amber-600">هدهد</h1>
                <p id="licenseStatusBadge" class="text-[10px] font-bold text-slate-400"></p>
            </div>
            <button onclick="logout()" class="text-xs font-bold text-rose-500 bg-rose-50 px-3 py-2 rounded-xl">تسجيل الخروج</button>
        </div>

        <div class="grid grid-cols-2 gap-3 mb-6">
            <div class="bg-white p-4 rounded-2xl shadow-sm border-b-4 border-amber-500">
                <p class="text-[10px] text-gray-400 font-bold uppercase">إجمالي المنتجات</p>
                <span id="totalItems" class="text-2xl font-black text-slate-800">0</span>
            </div>
            <div class="bg-white p-4 rounded-2xl shadow-sm border-b-4 border-emerald-500">
                <p class="text-[10px] text-gray-400 font-bold uppercase">المخزون الكلي</p>
                <span id="totalStock" class="text-2xl font-black text-slate-800">0</span>
            </div>
        </div>

        <div class="space-y-4">
            <div class="flex items-center justify-between px-2">
                <h2 class="font-black text-slate-800">📦 قائمة السلع</h2>
                <button onclick="addProd()" class="text-amber-600 font-bold text-sm">+ إضافة سريعة</button>
            </div>
            <div id="productsList" class="bg-white rounded-3xl shadow-sm divide-y divide-slate-50 overflow-hidden border border-slate-100">
                </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, getDoc, setDoc, collection, onSnapshot, query, orderBy, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    // إعدادات مشروعك التي زودتني بها
    const firebaseConfig = {
      apiKey: "AIzaSyAuECTMZfc3ode7iIxXEdz72My3hH_v5jE",
      authDomain: "hodhod-c4aa2.firebaseapp.com",
      databaseURL: "https://hodhod-c4aa2-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "hodhod-c4aa2",
      storageBucket: "hodhod-c4aa2.firebasestorage.app",
      messagingSenderId: "579573823574",
      appId: "1:579573823574:web:106bd5ebe580f3b0ace3f7",
      measurementId: "G-W5Y9JLE511"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const provider = new GoogleAuthProvider();

    let currentUser = null;

    // تسجيل الدخول
    window.loginWithGoogle = () => {
        document.getElementById('loginCard').classList.add('hidden');
        document.getElementById('appLoader').classList.remove('hidden');
        signInWithPopup(auth, provider).catch(err => {
            alert("خطأ في تسجيل الدخول: " + err.message);
            location.reload();
        });
    };

    window.logout = () => signOut(auth);

    // مراقبة حالة المستخدم
    onAuthStateChanged(auth, async (user) => {
        if (user) {
            currentUser = user;
            await checkLicense(user);
            syncData(user.uid);
        } else {
            document.getElementById('authOverlay').classList.remove('hidden');
            document.getElementById('mainAppContainer').classList.add('hidden');
            document.getElementById('loginCard').classList.remove('hidden');
            document.getElementById('appLoader').classList.add('hidden');
        }
    });

    // نظام الرخصة المجانية (يومين)
    async function checkLicense(user) {
        const userRef = doc(db, "users", user.uid);
        const snap = await getDoc(userRef);

        if (!snap.exists()) {
            const expiry = new Date();
            expiry.setDate(expiry.getDate() + 2); 
            await setDoc(userRef, {
                expiry: expiry.toISOString(),
                email: user.email,
                name: user.displayName,
                trialUsed: true
            });
            setupUI(expiry);
        } else {
            const expiry = new Date(snap.data().expiry);
            if (expiry > new Date()) {
                setupUI(expiry);
            } else {
                alert("انتهت الفترة التجريبية (يومين). يرجى الاتصال بالإدارة للتفعيل.");
                signOut(auth);
            }
        }
    }

    function setupUI(expiry) {
        document.getElementById('authOverlay').classList.add('hidden');
        document.getElementById('mainAppContainer').classList.remove('hidden');
        document.getElementById('licenseStatusBadge').innerText = "مرخص لغاية: " + expiry.toLocaleDateString('ar-DZ');
    }

    // مزامنة البيانات السحابية (المنتجات)
    function syncData(uid) {
        const q = query(collection(db, "users", uid, "products"), orderBy("name"));
        onSnapshot(q, (snapshot) => {
            const products = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            renderProducts(products);
        });
    }

    function renderProducts(prods) {
        const container = document.getElementById('productsList');
        document.getElementById('totalItems').innerText = prods.length;
        document.getElementById('totalStock').innerText = prods.reduce((acc, p) => acc + (p.stock || 0), 0);

        if (prods.length === 0) {
            container.innerHTML = '<p class="p-10 text-center text-gray-400">لا توجد منتجات. ابدأ بإضافة أول منتج!</p>';
            return;
        }

        container.innerHTML = prods.map(p => `
            <div class="p-4 flex justify-between items-center hover:bg-slate-50 transition">
                <div>
                    <h4 class="font-bold text-slate-800">${p.name}</h4>
                    <p class="text-xs font-bold text-amber-600">${p.price} دج | الكمية: ${p.stock}</p>
                </div>
                <div class="flex gap-2">
                    <button onclick="deleteProd('${p.id}')" class="p-2 text-rose-500 hover:bg-rose-50 rounded-lg transition">🗑️</button>
                </div>
            </div>
        `).join('');
    }

    // إضافة منتج جديد للسحابة
    window.addProd = async () => {
        const name = prompt("اسم المنتج الجديد:");
        const price = prompt("سعر البيع (دج):");
        const stock = prompt("الكمية المتوفرة:");
        
        if (name && price) {
            try {
                const newDoc = doc(collection(db, "users", currentUser.uid, "products"));
                await setDoc(newDoc, {
                    name: name,
                    price: parseFloat(price),
                    stock: parseFloat(stock) || 0,
                    createdAt: new Date().toISOString()
                });
            } catch (e) { alert("حدث خطأ أثناء الحفظ"); }
        }
    };

    // حذف منتج من السحابة
    window.deleteProd = async (id) => {
        if (confirm("هل أنت متأكد من حذف هذا المنتج نهائياً؟")) {
            await deleteDoc(doc(db, "users", currentUser.uid, "products", id));
        }
    };

</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
  <title>العناكب | الرياضيون - الأرقام القياسية - الترتيب</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: linear-gradient(145deg, #f6f9fc 0%, #edf2f7 100%);
      color: #0a1e2f;
      font-family: "Cairo", sans-serif;
      padding-bottom: 2rem;
    }
    .hero-top {
      background: radial-gradient(circle at 20% 30%, #0b2b26, #05161a);
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
      box-shadow: 0 20px 35px -12px rgba(0,0,0,0.25);
      border-bottom: 1px solid rgba(250,204,21,0.3);
    }
    .logo-area {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .logo-img {
      width: 52px;
      height: 52px;
      object-fit: contain;
      background: #facc15;
      border-radius: 20px;
      padding: 6px;
    }
    .site-name {
      font-size: 1.8rem;
      font-weight: 800;
      background: linear-gradient(130deg, #FFE488, #FFB347);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
    }
    .main-container {
      max-width: 1440px;
      margin: 2rem auto;
      padding: 0 1.8rem;
    }
    .tabs {
      display: flex;
      gap: 1rem;
      margin-bottom: 2rem;
      border-bottom: 2px solid #e2e8f0;
      padding-bottom: 0.5rem;
    }
    .tab-btn {
      background: transparent;
      border: none;
      padding: 0.8rem 1.8rem;
      font-size: 1.1rem;
      font-weight: 700;
      color: #475569;
      cursor: pointer;
      border-radius: 40px;
      transition: 0.2s;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .tab-btn.active {
      background: #facc15;
      color: #0f172a;
    }
    .tab-btn:not(.active):hover {
      background: #eef2ff;
      color: #0f172a;
    }
    .tab-content {
      display: none;
      animation: fade 0.2s ease;
    }
    .tab-content.active-tab {
      display: block;
    }
    @keyframes fade { from { opacity: 0; } to { opacity: 1; } }
    .section-card {
      background: white;
      border-radius: 40px;
      overflow: hidden;
      border: 1px solid #eef2ff;
      box-shadow: 0 15px 30px rgba(0,0,0,0.05);
    }
    .section-header {
      background: #0f172a;
      padding: 1rem 2rem;
      color: #facc15;
      font-size: 1.3rem;
      font-weight: 800;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .section-content {
      padding: 1.8rem;
    }
    .athletes-grid, .spiders-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.5rem;
    }
    .athlete-card {
      background: #f8fafc;
      border-radius: 28px;
      padding: 1rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      transition: transform 0.2s;
      border: 1px solid #e2e8f0;
    }
    .athlete-card:hover { transform: translateY(-4px); background: #ffffff; box-shadow: 0 12px 20px -10px rgba(0,0,0,0.1); }
    .athlete-img {
      width: 70px;
      height: 70px;
      border-radius: 35px;
      object-fit: cover;
      background: #cbd5e1;
    }
    .athlete-info { flex: 1; }
    .athlete-name { font-weight: 800; font-size: 1.2rem; }
    .athlete-country { color: #475569; font-size: 0.8rem; display: flex; align-items: center; gap: 5px; margin-top: 4px; }
    .athlete-instagram a { color: #d62976; text-decoration: none; font-size: 0.8rem; font-weight: 600; }
    .spider-rank-badge {
      background: #facc15;
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 60px;
      font-weight: 800;
      font-size: 1.3rem;
    }
    .spider-points { font-weight: 700; color: #b45309; }
    .filter-bar {
      background: #f1f5f9;
      border-radius: 60px;
      padding: 0.5rem 1.5rem;
      margin-bottom: 2rem;
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      align-items: center;
    }
    .filter-bar input, .filter-bar select {
      padding: 10px 18px;
      border-radius: 40px;
      border: 1px solid #cbd5e1;
      background: white;
    }
    .videos-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1.8rem;
    }
    .record-card {
      background: white;
      border-radius: 28px;
      overflow: hidden;
      box-shadow: 0 10px 20px rgba(0,0,0,0.05);
      transition: all 0.2s;
    }
    .record-card:hover { transform: translateY(-6px); }
    .card-img-wrapper {
      position: relative;
      height: 180px;
      background: #d4dce6;
    }
    .card-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .rank-badge {
      position: absolute;
      top: 12px;
      right: 12px;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(4px);
      padding: 4px 12px;
      border-radius: 40px;
      color: #facc15;
      font-weight: bold;
    }
    .card-content { padding: 1rem; }
    .record-stats { background: #fef9e6; padding: 6px 12px; border-radius: 40px; display: inline-block; margin: 10px 0; font-weight: 700; }
    .meta-tags { display: flex; gap: 8px; flex-wrap: wrap; margin: 8px 0; }
    .cat-tag, .country-tag { font-size: 0.7rem; background: #eef2ff; padding: 4px 12px; border-radius: 40px; }
    .card-actions { margin-top: 12px; }
    .watch-btn-card { background: #0f172a; color: white; border: none; padding: 8px; border-radius: 40px; width: 100%; cursor: pointer; font-weight: 600; }
    .modal-video { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.9); z-index:2000; align-items: center; justify-content: center; }
    .modal-card { background: #0f172a; width: 90%; max-width: 1000px; border-radius: 36px; overflow: hidden; position: relative; }
    .modal-close { position: absolute; top: 12px; left: 12px; background: #ef4444; color: white; border: none; width: 44px; height:44px; border-radius: 50%; font-size: 1.5rem; cursor: pointer; z-index: 25; }
    .video-frame { width: 100%; aspect-ratio: 16/9; border: none; }
    footer { text-align: center; margin-top: 2rem; color: #4b5563; }
    @media (max-width: 700px) { .section-content { padding: 1rem; } .athletes-grid, .spiders-grid { grid-template-columns: 1fr; } .tab-btn { padding: 0.5rem 1rem; font-size: 0.9rem; } }
    .empty-state { text-align: center; padding: 3rem; color: #64748b; }
    .result-badge { margin: 1rem 0 0.5rem; font-weight: 700; }
    .public-badge {
      background: #eef2ff;
      padding: 8px 16px;
      border-radius: 60px;
      display: inline-block;
      margin-top: 1rem;
      text-align: center;
    }
  </style>
</head>
<body>

<div class="hero-top">
  <div class="logo-area">
    <img src="https://up6.cc/2026/04/177675953899421.png" alt="العناكب" class="logo-img" />
    <span class="site-name">العنــاكب</span>
  </div>
  <div class="public-badge"><i class="fas fa-globe"></i> منصة عامة - جميع الحقوق محفوظة</div>
</div>

<div class="main-container">
  <!-- تبويب التنقل بين الواجهات -->
  <div class="tabs">
    <button class="tab-btn active" data-tab="athletes"><i class="fas fa-users"></i> الرياضيون</button>
    <button class="tab-btn" data-tab="records"><i class="fas fa-trophy"></i> الأرقام القياسية</button>
    <button class="tab-btn" data-tab="spiders"><i class="fas fa-spider"></i> العناكب (الترتيب)</button>
  </div>

  <!-- واجهة الرياضيون -->
  <div id="athletesTab" class="tab-content active-tab">
    <div class="section-card">
      <div class="section-header"><i class="fas fa-users"></i> قائمة الرياضيين</div>
      <div class="section-content">
        <div id="athletesList" class="athletes-grid"><div class="empty-state">جاري تحميل الرياضيين...</div></div>
      </div>
    </div>
  </div>

  <!-- واجهة الأرقام القياسية -->
  <div id="recordsTab" class="tab-content">
    <div class="section-card">
      <div class="section-header"><i class="fas fa-trophy"></i> الأرقام القياسية</div>
      <div class="section-content">
        <div class="filter-bar">
          <input type="text" id="searchInput" placeholder="🔍 بحث بالاسم">
          <select id="categoryFilter"><option value="all">🏆 جميع التصنيفات</option></select>
          <select id="countryFilter"><option value="all">🌍 جميع الدول</option></select>
        </div>
        <div id="resultsCount" class="result-badge"></div>
        <div id="videosGrid" class="videos-grid"></div>
      </div>
    </div>
  </div>

  <!-- واجهة العناكب (الترتيب) -->
  <div id="spidersTab" class="tab-content">
    <div class="section-card">
      <div class="section-header"><i class="fas fa-spider"></i> العناكب - الترتيب حسب النقاط</div>
      <div class="section-content">
        <div id="spidersRanking" class="spiders-grid"><div class="empty-state">حساب النقاط والترتيب...</div></div>
      </div>
    </div>
  </div>
</div>
<footer>🕸️ العناكب - منصة الأرقام القياسية العربية | نظام عام للقراءة فقط | ترتيب ديناميكي حسب النقاط</footer>

<div id="videoModal" class="modal-video"><div class="modal-card"><button class="modal-close" id="closeModalBtn">&times;</button><iframe id="youtubeIframe" class="video-frame" allowfullscreen></iframe></div></div>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyAuECTMZfc3ode7iIxXEdz72My3hH_v5jE",
    authDomain: "hodhod-c4aa2.firebaseapp.com",
    databaseURL: "https://hodhod-c4aa2-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "hodhod-c4aa2",
    storageBucket: "hodhod-c4aa2.firebasestorage.app",
    messagingSenderId: "579573823574",
    appId: "1:579573823574:web:106bd5ebe580f3b0ace3f7"
  };
  firebase.initializeApp(firebaseConfig);
  const database = firebase.database();
  
  let videosArray = [];
  let categories = [];
  let countries = [];
  let exerciseMap = {};

  const defaultCategories = ["push up","muscle up","squat","pull up","dips","bench press","deadlift","burpees"];
  const defaultCountries = ["مصر","السعودية","الإمارات","الكويت","قطر","البحرين","الأردن","تونس","الجزائر","المغرب","العراق"];

  function getValidImageUrl(url) { return (url && url.startsWith("http")) ? url : "https://picsum.photos/id/100/300/200"; }
  function extractYoutubeId(url) {
    if (!url) return null;
    const patterns = [/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/|youtube\.com\/v\/)([a-zA-Z0-9_-]{11})(?:[?&/]|$)/, /^([a-zA-Z0-9_-]{11})$/];
    for (let p of patterns) { const m = url.match(p); if (m && m[1]) return m[1]; }
    return null;
  }
  function getEmbedUrl(url) { let id = extractYoutubeId(url); return id ? `https://www.youtube.com/embed/${id}` : null; }
  function escapeHtml(str) { if(!str) return ""; return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]); }
  function formatTime(seconds) { if (!seconds && seconds !== 0) return "0 ثانية"; let mins = Math.floor(seconds / 60); let secs = seconds % 60; return `${mins}:${secs<10?'0':''}${secs} دقيقة`; }
  function formatAchievement(record) {
    let type = record.achievementType || 'reps';
    let value = record.achievementValue || 0;
    if (type === 'time') return `⏱️ ${formatTime(value)}`;
    return `🔢 ${value.toLocaleString()} تكرار`;
  }
  function computeSortValue(record) {
    let type = record.achievementType || 'reps';
    let value = record.achievementValue || 0;
    if (type === 'time') return -value;
    return value;
  }
  function updateExerciseMap() { categories.forEach(c => { exerciseMap[c] = c.replace(/[-_]/g,' ').split(' ').map(w=>w.charAt(0).toUpperCase()+w.slice(1)).join(' ') || c; }); }

  function computeAthletePoints() {
    const categoryVideos = {};
    videosArray.forEach(v => { const cat = v.category; if (!categoryVideos[cat]) categoryVideos[cat] = []; categoryVideos[cat].push(v); });
    const athletePoints = {};
    for (let cat in categoryVideos) {
      let list = categoryVideos[cat];
      list.sort((a,b) => (b.sortValue || computeSortValue(b)) - (a.sortValue || computeSortValue(a)));
      list.forEach((video, idx) => { let points = Math.max(0, 100 - (idx * 5)); athletePoints[video.name] = (athletePoints[video.name] || 0) + points; });
    }
    let ranking = Object.entries(athletePoints).map(([name, points]) => ({ name, points }));
    ranking.sort((a,b) => b.points - a.points);
    return ranking;
  }

  function renderAthletes() {
    const container = document.getElementById("athletesList");
    if (!container) return;
    const athletesMap = new Map();
    videosArray.forEach(v => {
      const name = v.name;
      if (!athletesMap.has(name)) athletesMap.set(name, { name, imageUrl: v.imageUrl, country: v.country, instagram: v.instagram || null });
      else { let existing = athletesMap.get(name); if (!existing.imageUrl && v.imageUrl) existing.imageUrl = v.imageUrl; if (!existing.instagram && v.instagram) existing.instagram = v.instagram; if (!existing.country && v.country) existing.country = v.country; }
    });
    const athletes = Array.from(athletesMap.values());
    if (athletes.length === 0) { container.innerHTML = '<div class="empty-state">لا يوجد رياضيون حتى الآن</div>'; return; }
    container.innerHTML = athletes.map(ath => `
      <div class="athlete-card">
        <img class="athlete-img" src="${getValidImageUrl(ath.imageUrl)}" onerror="this.src='https://picsum.photos/id/100/70/70'">
        <div class="athlete-info">
          <div class="athlete-name">${escapeHtml(ath.name)}</div>
          <div class="athlete-country"><i class="fas fa-map-marker-alt"></i> ${escapeHtml(ath.country || 'غير محدد')}</div>
          ${ath.instagram ? `<div class="athlete-instagram"><i class="fab fa-instagram"></i> <a href="${escapeHtml(ath.instagram)}" target="_blank">متابعة على إنستغرام</a></div>` : '<div class="athlete-instagram" style="color:#aaa;">لا يوجد حساب</div>'}
        </div>
      </div>
    `).join('');
  }

  function renderSpidersRanking() {
    const container = document.getElementById("spidersRanking");
    if (!container) return;
    const ranking = computeAthletePoints();
    if (ranking.length === 0) { container.innerHTML = '<div class="empty-state">لا توجد أرقام قياسية لحساب النقاط</div>'; return; }
    const athleteExtra = new Map();
    videosArray.forEach(v => { if (!athleteExtra.has(v.name)) athleteExtra.set(v.name, { imageUrl: v.imageUrl, country: v.country }); });
    container.innerHTML = ranking.map((item, idx) => {
      const extra = athleteExtra.get(item.name) || {};
      return `<div class="athlete-card"><div class="spider-rank-badge">#${idx+1}</div><img class="athlete-img" src="${getValidImageUrl(extra.imageUrl)}" onerror="this.src='https://picsum.photos/id/100/70/70'"><div class="athlete-info"><div class="athlete-name">${escapeHtml(item.name)}</div><div class="spider-points"><i class="fas fa-star"></i> ${item.points} نقطة</div><div class="athlete-country"><i class="fas fa-flag"></i> ${escapeHtml(extra.country || '؟')}</div></div></div>`;
    }).join('');
  }

  function renderVideoList() {
    const grid = document.getElementById("videosGrid");
    if (!grid) return;
    let filtered = [...videosArray];
    const search = document.getElementById("searchInput")?.value.toLowerCase().trim() || "";
    const cat = document.getElementById("categoryFilter")?.value || "all";
    const country = document.getElementById("countryFilter")?.value || "all";
    if(search) filtered = filtered.filter(v => v.name.toLowerCase().includes(search));
    if(cat !== "all") filtered = filtered.filter(v => v.category === cat);
    if(country !== "all") filtered = filtered.filter(v => v.country === country);
    filtered.sort((a,b) => (b.sortValue || computeSortValue(b)) - (a.sortValue || computeSortValue(a)));
    document.getElementById("resultsCount").innerHTML = `🏅 ${filtered.length} رقماً قياسياً 🏅`;
    if(!filtered.length) { grid.innerHTML = `<div class="empty-state"><i class="fas fa-dumbbell"></i> لا توجد نتائج</div>`; return; }
    let html = "";
    filtered.forEach((v, idx) => {
      html += `<div class="record-card"><div class="card-img-wrapper"><img class="card-img" src="${getValidImageUrl(v.imageUrl)}" onerror="this.src='https://picsum.photos/id/26/300/200'"><div class="rank-badge">#${idx+1}</div></div><div class="card-content"><div class="athlete-name">${escapeHtml(v.name)}</div><div class="record-stats">${formatAchievement(v)}</div><div class="meta-tags"><span class="cat-tag">${escapeHtml(exerciseMap[v.category] || v.category)}</span><span class="country-tag">${escapeHtml(v.country)}</span></div>${v.instagram ? `<div><i class="fab fa-instagram"></i> <a href="${escapeHtml(v.instagram)}" target="_blank" style="font-size:0.75rem;">حساب الرياضي</a></div>` : ''}<div class="card-actions"><button class="watch-btn-card" data-embed="${escapeHtml(v.youtubeUrl)}"><i class="fab fa-youtube"></i> مشاهدة</button></div></div></div>`;
    });
    grid.innerHTML = html;
    document.querySelectorAll(".watch-btn-card").forEach(btn => btn.onclick = () => openVideoModal(btn.dataset.embed));
  }

  function refreshAllSelects() {
    const catSelects = [document.getElementById("categoryFilter")];
    const countrySelects = [document.getElementById("countryFilter")];
    catSelects.forEach(sel => { if(sel) { let old=sel.value; sel.innerHTML='<option value="all">🏆 جميع التصنيفات</option>'+categories.map(c=>`<option value="${c}">${exerciseMap[c]||c}</option>`).join(''); if(old!=='all' && categories.includes(old)) sel.value=old; else sel.value='all'; } });
    countrySelects.forEach(sel => { if(sel) { let old=sel.value; sel.innerHTML='<option value="all">🌍 جميع الدول</option>'+countries.map(c=>`<option value="${c}">🇦🇪 ${c}</option>`).join(''); if(old!=='all' && countries.includes(old)) sel.value=old; else sel.value='all'; } });
  }

  function setupConfigListeners() {
    database.ref("config/categories").on("value", (snap) => { 
      let data = snap.val(); 
      categories = (data && Array.isArray(data)) ? data : [...defaultCategories]; 
      if(!data) database.ref("config/categories").set(categories); 
      updateExerciseMap(); 
      refreshAllSelects(); 
      renderAthletes(); 
      renderSpidersRanking(); 
      renderVideoList(); 
    });
    database.ref("config/countries").on("value", (snap) => { 
      let data = snap.val(); 
      countries = (data && Array.isArray(data)) ? data : [...defaultCountries]; 
      if(!data) database.ref("config/countries").set(countries); 
      refreshAllSelects(); 
      renderAthletes(); 
      renderSpidersRanking(); 
      renderVideoList(); 
    });
  }

  function startVideosListener() {
    database.ref("videos").on("value", (snap) => {
      const data = snap.val();
      videosArray = data ? Object.entries(data).map(([id, v]) => ({ id, name: v.name || "بطل", imageUrl: v.imageUrl || "", youtubeUrl: v.youtubeUrl || "", instagram: v.instagram || null, category: v.category || (categories[0]||"push up"), country: v.country || (countries[0]||"مصر"), achievementType: v.achievementType || 'reps', achievementValue: v.achievementValue !== undefined ? v.achievementValue : 0, sortValue: v.sortValue })) : [];
      videosArray.forEach(v => { if(v.sortValue===undefined) v.sortValue = computeSortValue(v); });
      renderAthletes(); 
      renderSpidersRanking(); 
      renderVideoList();
    });
  }

  function openVideoModal(embedUrl) { 
    let finalUrl = embedUrl.includes("embed") ? embedUrl : `https://www.youtube.com/embed/${extractYoutubeId(embedUrl)}`; 
    if(finalUrl && finalUrl.includes("youtube.com/embed")) { 
      document.getElementById("youtubeIframe").src = finalUrl; 
      document.getElementById("videoModal").style.display = "flex"; 
    } else alert("رابط الفيديو غير صالح"); 
  }
  function closeModal() { 
    document.getElementById("youtubeIframe").src = ""; 
    document.getElementById("videoModal").style.display = "none"; 
  }

  // التحكم في التبويب
  function initTabs() {
    const btns = document.querySelectorAll('.tab-btn');
    const tabs = { athletes: document.getElementById('athletesTab'), records: document.getElementById('recordsTab'), spiders: document.getElementById('spidersTab') };
    btns.forEach(btn => {
      btn.addEventListener('click', () => {
        const tabId = btn.dataset.tab;
        btns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        Object.values(tabs).forEach(tab => tab.classList.remove('active-tab'));
        if (tabId === 'athletes') tabs.athletes.classList.add('active-tab');
        else if (tabId === 'records') tabs.records.classList.add('active-tab');
        else if (tabId === 'spiders') tabs.spiders.classList.add('active-tab');
      });
    });
  }

  window.onload = () => {
    initTabs();
    setupConfigListeners();
    startVideosListener();
    document.getElementById("searchInput")?.addEventListener("input", () => renderVideoList());
    document.getElementById("categoryFilter")?.addEventListener("change", () => renderVideoList());
    document.getElementById("countryFilter")?.addEventListener("change", () => renderVideoList());
    document.getElementById("closeModalBtn")?.addEventListener("click", closeModal);
    document.getElementById("videoModal")?.addEventListener("click", (e) => { if(e.target===document.getElementById("videoModal")) closeModal(); });
  };
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>هدهد ماركت - سوق مسعد | منصة متكاملة مع Firebase</title>
    <link rel="icon" type="image/png" href="https://i.postimg.cc/3NZ6WbKP/235264114-157440589754796-4426353709702884299-n-removebg-preview.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Tajawal', sans-serif; background: #f5f7fa; color: #1e2a3e; line-height: 1.4; }
        /* Flat Design - minimal shadows */
        .flat-card { background: white; border: 1px solid #e2e8f0; border-radius: 16px; transition: 0.1s linear; }
        .flat-card:hover { border-color: #cbd5e1; }
        .btn { border: none; padding: 8px 18px; border-radius: 40px; font-weight: 600; cursor: pointer; font-family: inherit; transition: 0.1s; }
        .btn-primary { background: #2563eb; color: white; }
        .btn-outline { background: transparent; border: 1px solid #2563eb; color: #2563eb; }
        .btn-danger { background: #dc2626; color: white; }
        .badge { background: #eef2ff; color: #1e40af; padding: 4px 12px; border-radius: 30px; font-size: 0.75rem; font-weight: 600; display: inline-block; }
        /* header */
        .app-header { background: #1e3a8a; padding: 12px 24px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; position: sticky; top: 0; z-index: 100; }
        .logo-area { display: flex; align-items: center; gap: 8px; color: white; font-weight: 800; font-size: 1.4rem; }
        .logo-area img { width: 42px; height: 42px; object-fit: contain; }
        .user-info { display: flex; align-items: center; gap: 12px; background: rgba(255,255,255,0.15); padding: 5px 16px; border-radius: 40px; }
        .user-info span { color: white; font-weight: 500; }
        /* nav bar */
        .nav-bar { background: white; border-bottom: 1px solid #e2e8f0; padding: 0 20px; display: flex; flex-wrap: wrap; gap: 4px; overflow-x: auto; }
        .nav-link { padding: 14px 18px; font-weight: 600; color: #334155; cursor: pointer; border-bottom: 3px solid transparent; transition: 0.1s; white-space: nowrap; }
        .nav-link.active { color: #2563eb; border-bottom-color: #2563eb; }
        /* main */
        .main-container { max-width: 1300px; margin: 20px auto; padding: 0 20px; }
        /* filter row */
        .filter-row { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 24px; align-items: center; }
        .search-input { flex: 2; min-width: 200px; padding: 10px 18px; border-radius: 40px; border: 1px solid #cbd5e1; background: white; font-family: inherit; }
        .filter-chips { display: flex; gap: 10px; flex-wrap: wrap; }
        .chip { background: #f1f5f9; padding: 6px 16px; border-radius: 40px; font-size: 0.85rem; cursor: pointer; transition: 0.1s; border: 1px solid transparent; }
        .chip.active { background: #2563eb; color: white; border-color: #2563eb; }
        .tabs-sub { display: flex; gap: 16px; margin-bottom: 20px; border-bottom: 1px solid #e2e8f0; }
        .sub-tab { padding: 8px 4px; cursor: pointer; font-weight: 600; color: #475569; border-bottom: 2px solid transparent; }
        .sub-tab.active { color: #2563eb; border-bottom-color: #2563eb; }
        /* cards grid */
        .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 20px; margin-top: 16px; }
        .product-card { background: white; border-radius: 20px; border: 1px solid #e2e8f0; overflow: hidden; cursor: pointer; transition: 0.1s; }
        .product-card:hover { transform: translateY(-2px); border-color: #94a3b8; }
        .product-img { width: 100%; height: 170px; object-fit: cover; background: #f8fafc; }
        .product-info { padding: 14px; }
        .product-price { font-size: 1.3rem; font-weight: 800; color: #2563eb; margin: 6px 0; }
        .shop-vertical-item { display: flex; gap: 16px; background: white; border: 1px solid #e2e8f0; border-radius: 20px; padding: 12px; margin-bottom: 12px; cursor: pointer; align-items: center; }
        .shop-avatar { width: 70px; height: 70px; border-radius: 20px; object-fit: cover; }
        /* chat layout */
        .chat-layout { display: flex; gap: 20px; flex-wrap: wrap; background: white; border-radius: 24px; border: 1px solid #e2e8f0; overflow: hidden; }
        .chat-sidebar { flex: 1; min-width: 260px; background: #fafcff; border-left: 1px solid #e2e8f0; padding: 16px; }
        .chat-main { flex: 3; display: flex; flex-direction: column; background: white; min-height: 500px; }
        .chat-messages { flex: 1; padding: 16px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; max-height: 450px; }
        .message-bubble { max-width: 80%; padding: 8px 14px; border-radius: 24px; background: #f1f5f9; align-self: flex-start; }
        .message-bubble.me { background: #2563eb; color: white; align-self: flex-end; }
        .chat-input-area { display: flex; gap: 12px; padding: 16px; border-top: 1px solid #e2e8f0; }
        /* modal */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(2px); z-index: 1000; align-items: center; justify-content: center; }
        .modal-card { background: white; width: 90%; max-width: 550px; border-radius: 28px; max-height: 85vh; overflow-y: auto; }
        .modal-header { padding: 16px 20px; border-bottom: 1px solid #e2e8f0; display: flex; justify-content: space-between; font-weight: 800; }
        .modal-body { padding: 20px; }
        .unread-dot { width: 10px; height: 10px; background: #ef4444; border-radius: 50%; display: inline-block; margin-right: 6px; }
        .footer { text-align: center; padding: 24px; color: #64748b; border-top: 1px solid #e2e8f0; margin-top: 40px; }
        @media (max-width: 700px) { .chat-layout { flex-direction: column; } }
        .btn-sm { padding: 6px 12px; font-size: 0.8rem; }
    </style>
</head>
<body>

<header class="app-header">
    <div class="logo-area">
        <img src="https://i.postimg.cc/3NZ6WbKP/235264114-157440589754796-4426353709702884299-n-removebg-preview.png" alt="logo">
        <span>هدهد ماركت</span>
    </div>
    <div class="user-info" id="userInfo">
        <span id="userNameSpan">زائر</span>
        <button id="authBtn" class="btn btn-outline" style="background:white; color:#1e3a8a;">دخول</button>
    </div>
</header>

<nav class="nav-bar" id="navBar">
    <div class="nav-link active" data-nav="explore">🏠 الرئيسية</div>
    <div class="nav-link" data-nav="services">🔧 الخدمات</div>
    <div class="nav-link" data-nav="shops">🏪 دليل المحلات</div>
    <div class="nav-link" data-nav="chats">💬 الدردشة</div>
    <div class="nav-link" data-nav="notifications">🔔 الإشعارات</div>
    <div class="nav-link" id="myShopNav" style="display:none;" data-nav="myShop">🏬 متجري</div>
    <div class="nav-link" id="adminNav" style="display:none;" data-nav="admin">👑 لوحة الأدمن</div>
</nav>

<main class="main-container" id="mainApp">
    <!-- المحتوى الديناميكي -->
</main>

<div class="footer">
    <img src="https://i.postimg.cc/3NZ6WbKP/235264114-157440589754796-4426353709702884299-n-removebg-preview.png" width="28">
    <p>📍 هدهد ماركت - سوق مسعد | نظام متكامل مع Firebase | محلات، خدمات، دردشة، طلبات متاجر</p>
</div>

<!-- مودال عام -->
<div id="itemModal" class="modal"><div class="modal-card"><div class="modal-header"><span id="modalTitle">تفاصيل</span><button class="close-modal" onclick="closeModal()" style="background:none; border:none; font-size:24px;">&times;</button></div><div class="modal-body" id="modalBody"></div></div></div>

<script>
    // ---------------------- Firebase CONFIG (استبدل بمفاتيحك) ----------------------
    const firebaseConfig = {
        apiKey: "AIzaSyAuECTMZfc3ode7iIxXEdz72My3hH_v5jE",
        authDomain: "hodhod-c4aa2.firebaseapp.com",
        projectId: "hodhod-c4aa2",
        storageBucket: "hodhod-c4aa2.firebasestorage.app",
        messagingSenderId: "579573823574",
        appId: "1:579573823574:web:106bd5ebe580f3b0ace3f7"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();
    const storage = firebase.storage();

    // ---------------------- State ----------------------
    let currentUser = null;
    let currentNav = "explore";
    let currentSubTab = "local";
    let searchKeyword = "";
    let currentChatId = null;
    let unsubscribeChat = null;

    // ---------------------- Helper: UI Updates ----------------------
    async function updateUIForRole() {
        const logged = !!currentUser;
        const role = currentUser?.role;
        document.getElementById("myShopNav").style.display = (logged && role === "merchant") ? "flex" : "none";
        document.getElementById("adminNav").style.display = (logged && role === "admin") ? "flex" : "none";
        document.getElementById("userNameSpan").innerText = logged ? currentUser.name : "زائر";
        document.getElementById("authBtn").innerText = logged ? "تسجيل خروج" : "دخول";
        if (!logged && (currentNav === "myShop" || currentNav === "admin" || currentNav === "notifications")) {
            switchNav("explore");
        } else {
            renderCurrentView();
        }
        // زر تقديم طلب متجر للمستخدم العادي (سيظهر في صفحة "الرئيسية" أو "المتاجر")
        const requestBtn = document.getElementById("requestShopBtnGlobal");
        if(requestBtn) requestBtn.style.display = (logged && role === "registered") ? "inline-block" : "none";
    }

    function logout() { auth.signOut(); currentUser = null; updateUIForRole(); }

    // ---------------------- مودال تسجيل الدخول / التسجيل ----------------------
    function openModalAuth() {
        const html = `
            <div class="form-group"><label>البريد</label><input id="authEmail" type="email" placeholder="example@domain.com" class="search-input" style="width:100%"></div>
            <div class="form-group"><label>كلمة المرور</label><input id="authPass" type="password" class="search-input" style="width:100%"></div>
            <div id="authExtra" style="display:none; margin-top:12px;">
                <input id="regName" placeholder="الاسم الكامل" class="search-input" style="width:100%; margin-bottom:8px">
                <select id="regRole" class="search-input"><option value="registered">مستخدم عادي</option><option value="merchant">تاجر (فتح متجر - يطلب موافقة)</option></select>
                <div id="merchantFields" style="display:none; margin-top:8px;">
                    <input id="shopNameReg" placeholder="اسم المتجر*" class="search-input"><input id="shopPhoneReg" placeholder="رقم الهاتف*" class="search-input">
                    <input id="shopCatReg" placeholder="تصنيف المتجر" class="search-input">
                </div>
            </div>
            <button id="submitAuthBtn" class="btn btn-primary" style="width:100%; margin-top:12px;">دخول</button>
            <button id="googleAuthBtn" class="btn btn-outline" style="width:100%; margin-top:8px;"><i class="fab fa-google"></i> جوجل</button>
            <p style="margin-top:12px;"><a href="#" id="toggleAuthMode">إنشاء حساب جديد</a></p>
        `;
        document.getElementById("modalTitle").innerText = "تسجيل الدخول";
        document.getElementById("modalBody").innerHTML = html;
        document.getElementById("itemModal").style.display = "flex";
        let isLogin = true;
        const toggleLink = document.getElementById("toggleAuthMode");
        const authExtra = document.getElementById("authExtra");
        const submitBtn = document.getElementById("submitAuthBtn");
        const roleSelect = document.getElementById("regRole");
        const merchantDiv = document.getElementById("merchantFields");
        if(roleSelect) roleSelect.addEventListener("change", (e) => { merchantDiv.style.display = e.target.value === "merchant" ? "block" : "none"; });
        toggleLink.onclick = (e) => {
            e.preventDefault();
            isLogin = !isLogin;
            document.getElementById("modalTitle").innerText = isLogin ? "تسجيل الدخول" : "إنشاء حساب";
            authExtra.style.display = isLogin ? "none" : "block";
            submitBtn.innerText = isLogin ? "دخول" : "تسجيل";
        };
        submitBtn.onclick = async () => {
            const email = document.getElementById("authEmail").value;
            const pass = document.getElementById("authPass").value;
            if(!email || !pass) return alert("املأ البريد وكلمة المرور");
            if(isLogin) {
                try {
                    const cred = await auth.signInWithEmailAndPassword(email, pass);
                    const doc = await db.collection("users").doc(cred.user.uid).get();
                    if(!doc.exists) throw new Error("بيانات غير مكتملة");
                    currentUser = { uid: cred.user.uid, ...doc.data() };
                    closeModal();
                    updateUIForRole();
                } catch(e) { alert(e.message); }
            } else {
                const name = document.getElementById("regName").value;
                const role = document.getElementById("regRole").value;
                if(!name) return alert("أدخل الاسم");
                if(role === "merchant") {
                    const shopName = document.getElementById("shopNameReg").value;
                    const shopPhone = document.getElementById("shopPhoneReg").value;
                    if(!shopName || !shopPhone) return alert("اسم المتجر والهاتف مطلوبان للتاجر");
                    try {
                        const cred = await auth.createUserWithEmailAndPassword(email, pass);
                        // إنشاء طلب فتح متجر بدلاً من إنشاء محل فوري
                        await db.collection("shop_applications").add({
                            userId: cred.user.uid,
                            userName: name,
                            shopName: shopName,
                            phone: shopPhone,
                            cat: document.getElementById("shopCatReg").value || "عام",
                            status: "pending",
                            createdAt: firebase.firestore.FieldValue.serverTimestamp()
                        });
                        await db.collection("users").doc(cred.user.uid).set({
                            name, email, role: "registered", shopId: null,
                            createdAt: firebase.firestore.FieldValue.serverTimestamp()
                        });
                        alert("تم إرسال طلب فتح المتجر للإدارة. سيتم إشعارك عند الموافقة.");
                        closeModal();
                    } catch(e) { alert(e.message); }
                } else {
                    try {
                        const cred = await auth.createUserWithEmailAndPassword(email, pass);
                        await db.collection("users").doc(cred.user.uid).set({ name, email, role: "registered", createdAt: firebase.firestore.FieldValue.serverTimestamp() });
                        alert("تم التسجيل، سجل دخول");
                        closeModal();
                    } catch(e) { alert(e.message); }
                }
            }
        };
        document.getElementById("googleAuthBtn").onclick = async () => {
            const provider = new firebase.auth.GoogleAuthProvider();
            try {
                const result = await auth.signInWithPopup(provider);
                const userDoc = await db.collection("users").doc(result.user.uid).get();
                if(!userDoc.exists) await db.collection("users").doc(result.user.uid).set({ name: result.user.displayName, email: result.user.email, role: "registered", createdAt: new Date() });
                currentUser = { uid: result.user.uid, ...(await db.collection("users").doc(result.user.uid).get()).data() };
                closeModal();
                updateUIForRole();
            } catch(e) { alert(e); }
        };
    }
    function closeModal() { document.getElementById("itemModal").style.display = "none"; }

    // ---------------------- طلبات المتاجر: وظائف الأدمن ----------------------
    async function renderAdminApplications() {
        const appsSnap = await db.collection('shop_applications').where('status', '==', 'pending').get();
        const apps = appsSnap.docs.map(d => ({id: d.id, ...d.data()}));
        let html = '<h3>📋 طلبات فتح المتاجر</h3><div class="cards-grid">';
        if(apps.length === 0) html += '<div class="flat-card" style="padding:20px;">لا توجد طلبات معلقة</div>';
        apps.forEach(app => {
            html += `
                <div class="flat-card" style="padding:15px;">
                    <h4>🏪 ${app.shopName}</h4>
                    <p>👤 مقدم الطلب: ${app.userName}</p>
                    <p>📞 هاتف: ${app.phone}</p>
                    <p>🏷️ التصنيف: ${app.cat || 'عام'}</p>
                    <button class="btn btn-primary" style="background:#10b981; margin-top:8px;" 
                        onclick="approveShop('${app.id}', '${app.userId}', '${app.shopName}', '${app.phone}', '${app.cat}')">
                        ✅ موافقة وتفعيل المتجر
                    </button>
                </div>
            `;
        });
        html += '</div>';
        return html;
    }

    window.approveShop = async (appId, userId, shopName, phone, cat) => {
        try {
            const shopRef = await db.collection('shops').add({
                name: shopName, phone: phone, cat: cat || 'عام', userId: userId,
                city: 'مسعد', address: 'مسعد', img: 'https://picsum.photos/id/40/400/300',
                cover: 'https://picsum.photos/id/40/800/300', avatar: 'https://picsum.photos/id/40/100/100',
                followers: [], rating: 0, ratingCount: 0,
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });
            await db.collection('users').doc(userId).update({ role: 'merchant', shopId: shopRef.id });
            await db.collection('shop_applications').doc(appId).update({ status: 'approved', reviewedAt: firebase.firestore.FieldValue.serverTimestamp() });
            alert('✅ تم تفعيل المتجر بنجاح!');
            renderAdmin();
        } catch (error) { alert('خطأ: ' + error.message); }
    };

    async function requestShopApplication() {
        if (!currentUser) return alert('سجل دخول أولاً');
        if (currentUser.role !== 'registered') return alert('أنت بالفعل تاجر أو أدمن');
        const shopName = prompt('أدخل اسم المتجر الذي ترغب في فتحه:');
        if (!shopName) return;
        const phone = prompt('رقم الهاتف الخاص بالمحل:');
        if (!phone) return;
        const cat = prompt('تصنيف المحل (مثال: ملابس، إلكترونيات):') || 'عام';
        await db.collection('shop_applications').add({
            userId: currentUser.uid, userName: currentUser.name,
            shopName: shopName, phone: phone, cat: cat,
            status: 'pending', createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });
        alert('تم إرسال طلبك بنجاح. سيقوم الأدمن بمراجعته قريباً.');
    }

    // ---------------------- تصفح المنتجات والمحلات ----------------------
    async function renderExplore() {
        let productsQuery = db.collection("products");
        if(currentSubTab === "local") productsQuery = productsQuery.where("city", "==", "مسعد");
        else if(currentSubTab === "following" && currentUser) {
            const followedShops = await db.collection("shops").where("followers", "array-contains", currentUser.uid).get();
            const shopIds = followedShops.docs.map(d => d.id);
            if(shopIds.length) productsQuery = productsQuery.where("shopId", "in", shopIds);
            else productsQuery = productsQuery.limit(0);
        }
        const snap = await productsQuery.get();
        let items = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        if(searchKeyword) items = items.filter(i => i.name?.includes(searchKeyword) || (i.desc?.includes(searchKeyword)));
        const grid = document.getElementById("exploreGrid");
        if(!grid) return;
        if(items.length === 0) { grid.innerHTML = "<div class='flat-card' style='padding:40px; text-align:center'>لا توجد نتائج</div>"; return; }
        grid.innerHTML = items.map(p => `
            <div class="product-card" onclick="showProductDetail('${p.id}')">
                <img class="product-img" data-src="${p.imgUrl || 'https://picsum.photos/200/150'}" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20200%20150'%3E%3C/svg%3E">
                <div class="product-info"><h4>${p.name}</h4><div class="product-price">💰 ${p.price || 'غير محدد'}</div></div>
            </div>
        `).join('');
        const imgObserver = new IntersectionObserver((entries) => {
            entries.forEach(entry => { if(entry.isIntersecting) { const img = entry.target; img.src = img.dataset.src; imgObserver.unobserve(img); } });
        });
        document.querySelectorAll("#exploreGrid .product-img").forEach(img => imgObserver.observe(img));
    }

    async function renderServices() {
        const servicesSnap = await db.collection("services").get();
        const services = servicesSnap.docs.map(d => ({ id: d.id, ...d.data() }));
        const grid = document.getElementById("servicesGrid");
        if(grid) grid.innerHTML = services.map(s => `<div class="product-card" onclick="showServiceDetail('${s.id}')"><img class="product-img" src="${s.imageUrl || 'https://picsum.photos/200/150'}"><div class="product-info"><h4>${s.name}</h4><div>${s.workingHours || 'ساعات العمل: 9ص-10م'}</div></div></div>`).join('');
    }

    async function renderShopsList() {
        let query = db.collection("shops").orderBy("rating", "desc");
        const snap = await query.get();
        let shops = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        const search = document.getElementById("shopSearch")?.value || "";
        if(search) shops = shops.filter(s => s.name.includes(search));
        const container = document.getElementById("shopsList");
        if(container) container.innerHTML = shops.map(shop => `
            <div class="shop-vertical-item" onclick="viewShop('${shop.id}')">
                <img class="shop-avatar" src="${shop.avatar || 'https://picsum.photos/70/70'}">
                <div style="flex:1"><h3>${shop.name}</h3><div>⭐ ${shop.rating?.toFixed(1) || 0} (${shop.ratingCount || 0})</div><div>📍 ${shop.city || 'مسعد'}</div></div>
                ${currentUser && currentUser.role === 'registered' ? `<button class="btn btn-outline btn-sm" onclick="event.stopPropagation(); toggleFollowShop('${shop.id}')">${shop.followers?.includes(currentUser.uid) ? 'متابع ✔' : 'متابعة'}</button>` : ''}
            </div>
        `).join('');
    }

    window.toggleFollowShop = async (shopId) => { if(!currentUser) return alert("سجل دخول"); const shopRef = db.collection("shops").doc(shopId); const shop = (await shopRef.get()).data(); const isFollowing = shop.followers?.includes(currentUser.uid); if(isFollowing) await shopRef.update({ followers: firebase.firestore.FieldValue.arrayRemove(currentUser.uid) }); else await shopRef.update({ followers: firebase.firestore.FieldValue.arrayUnion(currentUser.uid) }); renderShopsList(); };
    window.viewShop = async (shopId) => { /* مشابه للكود السابق */ const shopDoc = await db.collection("shops").doc(shopId).get(); const shop = shopDoc.data(); const productsSnap = await db.collection("products").where("shopId", "==", shopId).get(); const products = productsSnap.docs.map(d => ({ id: d.id, ...d.data() })); document.getElementById("modalTitle").innerText = shop.name; document.getElementById("modalBody").innerHTML = `<img src="${shop.cover || shop.avatar}" style="width:100%; border-radius:20px;"><h3>${shop.name}</h3><p>${shop.desc || ''}</p><div>📞 ${shop.phone}</div><button class="btn btn-primary" onclick="startChat('${shop.userId}', '${shop.name}')">💬 دردشة</button><hr><h4>منتجات المحل</h4><div class="cards-grid">${products.map(p => `<div class="flat-card"><img src="${p.imgUrl}" style="width:100%"><div>${p.name}</div><div>${p.price}</div></div>`).join('')}</div>`; document.getElementById("itemModal").style.display = "flex"; };
    window.showProductDetail = async (productId) => { const prod = (await db.collection("products").doc(productId).get()).data(); document.getElementById("modalTitle").innerText = prod.name; document.getElementById("modalBody").innerHTML = `<img src="${prod.imgUrl}" style="width:100%"><h3>${prod.name}</h3><div class="product-price">${prod.price}</div><p>${prod.desc}</p><button class="btn btn-primary" onclick="startChat('${prod.sellerId}', 'تاجر')">💬 دردشة مع البائع</button>`; document.getElementById("itemModal").style.display = "flex"; };
    window.showServiceDetail = async (id) => { const s = (await db.collection("services").doc(id).get()).data(); document.getElementById("modalTitle").innerText = s.name; document.getElementById("modalBody").innerHTML = `<div>${s.desc}</div><div>📞 ${s.phone}</div><div>🕒 ${s.workingHours}</div><button class="btn btn-primary" onclick="startChat('admin','الدعم')">اتصل بالدعم</button>`; document.getElementById("itemModal").style.display = "flex"; };
    window.startChat = async (otherUserId, otherName) => { if(!currentUser) return; const chatId = [currentUser.uid, otherUserId].sort().join('_'); const chatRef = db.collection("chats").doc(chatId); const doc = await chatRef.get(); if(!doc.exists) await chatRef.set({ participants: [currentUser.uid, otherUserId], lastMessage: "", updatedAt: new Date() }); switchNav("chats"); setTimeout(() => { renderChatsInterface(chatId); }, 200); };

    // ---------------------- الدردشة ----------------------
    async function renderChatsInterface(highlightChatId=null) {
        const container = document.getElementById("mainApp");
        container.innerHTML = `<div class="chat-layout"><div class="chat-sidebar" id="chatListSide"><h4>المحادثات</h4><div id="chatsListSidebar"></div><button id="requestShopBtnGlobal" class="btn btn-primary btn-sm" style="margin-top:12px; width:100%; display:none;" onclick="requestShopApplication()">🏪 تقديم طلب فتح متجر</button></div><div class="chat-main"><div id="chatActiveWindow" class="chat-messages"><div class="empty-state">اختر محادثة</div></div><div class="chat-input-area" id="chatInputArea" style="display:none;"><input id="chatMessageInput" class="search-input" placeholder="رسالة..."><button id="sendMsgBtn" class="btn btn-primary">إرسال</button></div></div></div>`;
        await loadChatList(highlightChatId);
        const requestBtn = document.getElementById("requestShopBtnGlobal");
        if(requestBtn) requestBtn.style.display = (currentUser && currentUser.role === "registered") ? "inline-block" : "none";
    }
    async function loadChatList(selectedId) { if(!currentUser) return; const chatsSnap = await db.collection("chats").where("participants", "array-contains", currentUser.uid).get(); const chats = chatsSnap.docs.map(d => ({ id: d.id, ...d.data() })); const sidebar = document.getElementById("chatsListSidebar"); sidebar.innerHTML = chats.map(chat => `<div class="flat-card" style="padding:10px; margin-bottom:8px; cursor:pointer;" onclick="openChatRoom('${chat.id}')">💬 ${chat.participants.filter(p=>p!==currentUser.uid)[0]} <span class="unread-dot" style="display:${chat.unread? 'inline-block':'none'}"></span></div>`).join(''); if(selectedId) openChatRoom(selectedId); }
    window.openChatRoom = async (chatId) => { if(unsubscribeChat) unsubscribeChat(); currentChatId = chatId; const chatDoc = await db.collection("chats").doc(chatId).get(); const participants = chatDoc.data().participants; const otherId = participants.find(p => p !== currentUser.uid); const otherUser = (await db.collection("users").doc(otherId).get()).data(); const otherName = otherUser?.name || "مستخدم"; document.getElementById("chatActiveWindow").innerHTML = `<div id="messagesList" style="display:flex; flex-direction:column; gap:8px;"></div>`; document.getElementById("chatInputArea").style.display = "flex"; unsubscribeChat = db.collection("chats").doc(chatId).collection("messages").orderBy("timestamp").onSnapshot(snap => { const msgsDiv = document.getElementById("messagesList"); msgsDiv.innerHTML = snap.docs.map(m => `<div class="message-bubble ${m.data().sender === currentUser.uid ? 'me' : ''}"><strong>${m.data().senderName}</strong>: ${m.data().text}</div>`).join(''); msgsDiv.scrollTop = msgsDiv.scrollHeight; }); const sendBtn = document.getElementById("sendMsgBtn"); const input = document.getElementById("chatMessageInput"); const newSend = async () => { if(!input.value.trim()) return; await db.collection("chats").doc(chatId).collection("messages").add({ text: input.value, sender: currentUser.uid, senderName: currentUser.name, timestamp: new Date() }); await db.collection("chats").doc(chatId).update({ lastMessage: input.value, updatedAt: new Date() }); input.value = ""; }; sendBtn.onclick = newSend; input.onkeypress = (e) => { if(e.key === "Enter") newSend(); }; };

    // ---------------------- لوحة الأدمن الكاملة ----------------------
    async function renderAdmin() {
        if (currentUser?.role !== 'admin') return;
        const applicationsHtml = await renderAdminApplications();
        const usersSnap = await db.collection('users').get();
        const users = usersSnap.docs.map(d => ({ id: d.id, ...d.data() }));
        const usersHtml = `<h3>👥 إدارة المستخدمين</h3><div class="cards-grid">${users.map(u => `<div class="flat-card" style="padding:12px;"><strong>${u.name}</strong> (${u.email})<br>الدور: ${u.role}<br><button class="btn btn-outline btn-sm" onclick="deleteUser('${u.id}')">حذف المستخدم</button></div>`).join('')}</div>`;
        document.getElementById("mainApp").innerHTML = applicationsHtml + usersHtml;
    }
    window.deleteUser = async (uid) => { if(confirm("حذف المستخدم نهائياً؟")) { await db.collection('users').doc(uid).delete(); renderAdmin(); } };

    // ---------------------- متجري للتاجر ----------------------
    async function renderMyShop() { if(currentUser?.role !== 'merchant') return; const shopSnap = await db.collection('shops').where('userId', '==', currentUser.uid).get(); const shop = shopSnap.docs[0]?.data(); if(!shop) { document.getElementById("mainApp").innerHTML = '<div class="flat-card">لم يتم العثور على متجرك، يرجى التواصل مع الدعم.</div>'; return; } const products = (await db.collection('products').where('shopId', '==', shopSnap.docs[0].id).get()).docs.map(d => d.data()); document.getElementById("mainApp").innerHTML = `<div class="flat-card" style="padding:20px;"><h2>${shop.name}</h2><p>${shop.desc || ''}</p><div>📞 ${shop.phone}</div><button class="btn btn-primary" onclick="alert('إضافة منتج قريباً')">➕ إضافة سلعة</button><h3>منتجاتي</h3><div class="cards-grid">${products.map(p => `<div class="flat-card"><img src="${p.imgUrl}" style="width:100%"><div>${p.name}</div><div>${p.price}</div></div>`).join('')}</div></div>`; }

    // ---------------------- الإشعارات ----------------------
    async function renderNotifications() { document.getElementById("mainApp").innerHTML = `<div class="flat-card" style="padding:20px;">🔔 سيتم عرض الإشعارات هنا قريباً (إعجابات، متابعات، سلع جديدة).</div>`; }

    // ---------------------- التوجيه والتنقل ----------------------
    async function renderCurrentView() {
        if(currentNav === "explore") {
            document.getElementById("mainApp").innerHTML = `
                <div class="filter-row"><input type="text" id="globalSearch" class="search-input" placeholder="ابحث عن سلعة..." value="${searchKeyword}"><div class="filter-chips" id="categoryChips"></div></div>
                <div class="tabs-sub"><div class="sub-tab ${currentSubTab === 'local' ? 'active' : ''}" data-sub="local">📍 محلي (مسعد)</div><div class="sub-tab ${currentSubTab === 'following' ? 'active' : ''}" data-sub="following">❤️ أتابعه</div></div>
                <div id="exploreGrid" class="cards-grid"></div>
                <button id="requestShopBtnGlobal" class="btn btn-primary btn-sm" style="margin-top:16px; display:none;" onclick="requestShopApplication()">🏪 تقديم طلب فتح متجر</button>
            `;
            document.getElementById("globalSearch").addEventListener("input", (e) => { searchKeyword = e.target.value; renderExplore(); });
            document.querySelectorAll(".sub-tab").forEach(t => t.addEventListener("click", (e) => { currentSubTab = e.target.dataset.sub; renderCurrentView(); }));
            await renderExplore();
            const reqBtn = document.getElementById("requestShopBtnGlobal");
            if(reqBtn) reqBtn.style.display = (currentUser && currentUser.role === "registered") ? "inline-block" : "none";
        } else if(currentNav === "services") {
            document.getElementById("mainApp").innerHTML = `<div class="filter-row"><h3>الخدمات المقدمة</h3></div><div id="servicesGrid" class="cards-grid"></div>`;
            await renderServices();
        } else if(currentNav === "shops") {
            document.getElementById("mainApp").innerHTML = `<div class="filter-row"><input type="text" id="shopSearch" placeholder="بحث عن محل..." class="search-input"></div><div id="shopsList"></div><button id="requestShopBtnGlobal" class="btn btn-primary btn-sm" style="margin-top:16px; display:none;" onclick="requestShopApplication()">🏪 تقديم طلب فتح متجر</button>`;
            document.getElementById("shopSearch").addEventListener("input", () => renderShopsList());
            await renderShopsList();
            const reqBtn = document.getElementById("requestShopBtnGlobal");
            if(reqBtn) reqBtn.style.display = (currentUser && currentUser.role === "registered") ? "inline-block" : "none";
        } else if(currentNav === "chats") { await renderChatsInterface(); }
        else if(currentNav === "notifications") { await renderNotifications(); }
        else if(currentNav === "myShop") { await renderMyShop(); }
        else if(currentNav === "admin") { await renderAdmin(); }
    }

    function switchNav(nav) {
        currentNav = nav;
        document.querySelectorAll(".nav-link").forEach(link => link.classList.remove("active"));
        document.querySelector(`.nav-link[data-nav="${nav}"]`)?.classList.add("active");
        renderCurrentView();
    }
    document.querySelectorAll(".nav-link").forEach(link => link.addEventListener("click", () => switchNav(link.dataset.nav)));

    auth.onAuthStateChanged(async (user) => {
        if(user) { const doc = await db.collection("users").doc(user.uid).get(); currentUser = { uid: user.uid, ...doc.data() }; }
        else currentUser = null;
        updateUIForRole();
    });
    document.getElementById("authBtn").onclick = () => { if(currentUser) logout(); else openModalAuth(); };
    window.requestShopApplication = requestShopApplication;
    window.closeModal = closeModal;
    // إضافة بيانات وهمية اختيارية لتجربة سريعة
</script>
</body>
</html>

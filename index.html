<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lite Market - نظام متكامل بالمستخدمين والمتاجر</title>
    <style>
        :root {
            --fb-blue: #3b5998;
            --fb-bg: #e9ebee;
            --fb-green: #42b72a;
            --text-main: #1c1e21;
            --text-secondary: #606770;
            --white: #ffffff;
        }
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--fb-bg);
            margin: 0;
            color: var(--text-main);
        }
        header {
            background-color: var(--fb-blue);
            color: var(--white);
            padding: 12px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .logo-area { display: flex; align-items: center; gap: 10px; cursor: pointer; }
        .logo-icon { background: white; color: var(--fb-blue); padding: 2px 8px; border-radius: 4px; font-weight: bold; font-size: 20px; }
        .user-info { font-size: 13px; display: flex; gap: 10px; align-items: center; }
        .logout-btn { background: #dc3545; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; font-size: 12px; }
        nav {
            background: var(--white);
            display: flex;
            border-bottom: 1px solid #ddd;
            position: sticky;
            top: 48px;
            z-index: 999;
            flex-wrap: wrap;
        }
        .nav-item {
            flex: 1;
            text-align: center;
            padding: 12px 0;
            color: var(--text-secondary);
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
        }
        .nav-item.active { color: #1877f2; border-bottom: 3px solid #1877f2; background: #f0f2f5; }
        .main-container { max-width: 700px; margin: 15px auto; padding: 0 10px 80px 10px; }
        .search-bar {
            background: white;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 15px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
        }
        .search-input { flex: 2; min-width: 150px; padding: 8px 12px; border: 1px solid #ddd; border-radius: 20px; background: #f5f6f7; }
        .filter-category { flex: 1; min-width: 120px; padding: 8px 12px; border: 1px solid #ddd; border-radius: 20px; background: #f5f6f7; }
        .search-btn, .reset-btn { padding: 8px 16px; border-radius: 20px; border: none; font-weight: bold; cursor: pointer; }
        .search-btn { background: var(--fb-blue); color: white; }
        .reset-btn { background: #e4e6eb; color: #1c1e21; }
        .card {
            background: var(--white);
            border-radius: 8px;
            margin-bottom: 12px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
            overflow: hidden;
            border: 1px solid #ddd;
        }
        .card-content { display: flex; gap: 12px; padding: 12px; }
        .product-image { width: 80px; height: 80px; object-fit: cover; border-radius: 8px; background: #f0f2f5; }
        .product-details { flex: 1; }
        .price-tag { color: var(--fb-green); font-weight: bold; font-size: 18px; display: inline-block; margin-left: 10px; }
        .category-badge { background: #e4e6eb; padding: 2px 8px; border-radius: 12px; font-size: 11px; display: inline-block; }
        .region-phone { font-size: 12px; color: var(--text-secondary); margin-top: 5px; }
        .admin-section, .user-dashboard { background: #fff; border: 2px dashed var(--fb-blue); padding: 15px; margin-bottom: 20px; border-radius: 8px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-size: 13px; font-weight: bold; }
        input, select, textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; background: #f5f6f7; font-family: inherit; }
        button { cursor: pointer; border: none; border-radius: 4px; font-weight: bold; transition: 0.2s; }
        .btn-primary { background: var(--fb-blue); color: white; padding: 10px 20px; width: 100%; }
        .btn-success { background: var(--fb-green); color: white; padding: 5px 15px; }
        .btn-danger { background: #fa3e3e; color: white; padding: 5px 15px; }
        .btn-secondary { background: #6c757d; color: white; padding: 5px 15px; }
        .image-preview { width: 100px; height: 100px; object-fit: cover; border-radius: 8px; margin-top: 10px; border: 1px solid #ddd; }
        .fab {
            position: fixed;
            bottom: 20px;
            left: 20px;
            width: 56px;
            height: 56px;
            background: var(--fb-green);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            z-index: 1001;
            cursor: pointer;
        }
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: white;
            width: 95%;
            max-width: 500px;
            border-radius: 8px;
            max-height: 90vh;
            overflow-y: auto;
        }
        .modal-header { padding: 15px; background: #f0f2f5; border-bottom: 1px solid #ddd; display: flex; justify-content: space-between; }
        .close-modal { font-size: 24px; cursor: pointer; }
        .empty-state { text-align: center; padding: 40px; color: var(--text-secondary); }
        .shop-profile-header { background: white; padding: 15px; border-radius: 8px; margin-bottom: 15px; text-align: center; }
        .back-link { display: inline-block; margin-bottom: 15px; color: var(--fb-blue); cursor: pointer; text-decoration: underline; }
        .auth-container { max-width: 400px; margin: 50px auto; background: white; padding: 20px; border-radius: 8px; }
        .toggle-auth { color: var(--fb-blue); cursor: pointer; text-align: center; margin-top: 10px; }
        .error-msg { color: red; font-size: 12px; margin-top: 5px; }
    </style>
</head>
<body>

<div id="appRoot">
    <!-- سيتم عرض واجهة تسجيل الدخول أو المحتوى حسب الجلسة -->
</div>

<script>
    // ------------------------------ قاعدة البيانات ------------------------------
    let AppDB = {
        users: [],        // { id, email, password, name, role, shopId }
        products: [],     // { id, title, price, category, region, phone, description, image, status, ownerEmail }
        services: [],     // { id, name, price, category, region, phone, description, image, status, ownerEmail }
        shops: []         // { id, name, email, region, phone, verified, ownerEmail }
    };

    // المستخدم الحالي (session)
    let currentUser = null;

    // تحميل البيانات من localStorage
    function loadData() {
        const saved = localStorage.getItem("LiteMarketFullDB");
        if (saved) {
            try {
                const parsed = JSON.parse(saved);
                AppDB = { ...AppDB, ...parsed };
            } catch(e) {}
        }
        // بيانات أولية إذا كانت فارغة
        if (AppDB.users.length === 0) {
            // أدمن افتراضي
            AppDB.users.push({
                id: 1,
                email: "admin@lite.com",
                password: "admin123",
                name: "مدير النظام",
                role: "admin",
                shopId: null
            });
            // مستخدم عادي تجريبي
            AppDB.users.push({
                id: 2,
                email: "user@example.com",
                password: "user123",
                name: "أحمد محمد",
                role: "user",
                shopId: null
            });
            // منتجات أولية
            AppDB.products = [
                { id: 101, title: "هاتف سامسونج A54", price: "54000", category: "إلكترونيات", region: "الجزائر العاصمة", phone: "0555123456", description: "هاتف ممتاز", image: "", status: "approved", ownerEmail: "user@example.com" },
                { id: 102, title: "ساعة ذكية", price: "12000", category: "إلكترونيات", region: "وهران", phone: "0555987654", description: "ماركة أبل", image: "", status: "pending", ownerEmail: "user@example.com" }
            ];
            // خدمات أولية
            AppDB.services = [
                { id: 201, name: "تصليح هواتف", price: "3000", category: "خدمات منزلية", region: "الجزائر العاصمة", phone: "0770123456", description: "خدمة سريعة", image: "", status: "approved", ownerEmail: "admin@lite.com" }
            ];
            // متاجر أولية
            AppDB.shops = [
                { id: 501, name: "متجر الجزائر للتقنية", email: "contact@dz-tech.com", region: "الجزائر العاصمة", phone: "023456789", verified: true, ownerEmail: "admin@lite.com" }
            ];
        }
        saveData();
    }

    function saveData() {
        localStorage.setItem("LiteMarketFullDB", JSON.stringify(AppDB));
    }

    // ------------------------------ دوال المصادقة ------------------------------
    function register(email, password, name) {
        if (AppDB.users.find(u => u.email === email)) return { success: false, error: "البريد الإلكتروني موجود مسبقاً" };
        const newUser = {
            id: Date.now(),
            email,
            password,
            name,
            role: "user",
            shopId: null
        };
        AppDB.users.push(newUser);
        saveData();
        return { success: true, user: newUser };
    }

    function login(email, password) {
        const user = AppDB.users.find(u => u.email === email && u.password === password);
        if (!user) return { success: false, error: "بريد أو كلمة مرور غير صحيحة" };
        currentUser = { ...user }; // نسخة
        localStorage.setItem("liteMarketSession", JSON.stringify({ email: currentUser.email, role: currentUser.role, name: currentUser.name }));
        return { success: true, user: currentUser };
    }

    function logout() {
        currentUser = null;
        localStorage.removeItem("liteMarketSession");
        renderAuthScreen();
    }

    function checkSession() {
        const session = localStorage.getItem("liteMarketSession");
        if (session) {
            try {
                const sess = JSON.parse(session);
                const user = AppDB.users.find(u => u.email === sess.email);
                if (user) {
                    currentUser = { ...user };
                    return true;
                }
            } catch(e) {}
        }
        return false;
    }

    // ------------------------------ منطق التطبيق ------------------------------
    const AppLogic = {
        currentTab: 'products',
        searchKeyword: '',
        filterCategory: 'الكل',
        viewingShopEmail: null,   // لعرض صفحة متجر معين

        init() {
            loadData();
            if (checkSession()) {
                this.renderMainApp();
            } else {
                renderAuthScreen();
            }
        },

        renderMainApp() {
            const root = document.getElementById('appRoot');
            root.innerHTML = `
                <header>
                    <div class="logo-area" onclick="appLogic.switchTab('products')"><span class="logo-icon">f</span><span>Lite Market</span></div>
                    <div class="user-info">👤 ${currentUser.name} (${currentUser.role === 'admin' ? 'مدير' : 'مستخدم'}) <button class="logout-btn" onclick="appLogic.logout()">تسجيل خروج</button></div>
                </header>
                <nav>
                    <div class="nav-item ${this.currentTab === 'products' ? 'active' : ''}" data-tab="products">📦 السلع</div>
                    <div class="nav-item ${this.currentTab === 'services' ? 'active' : ''}" data-tab="services">🛠 الخدمات</div>
                    <div class="nav-item ${this.currentTab === 'shops' ? 'active' : ''}" data-tab="shops">🏪 المتاجر</div>
                    ${currentUser.role === 'admin' ? `<div class="nav-item ${this.currentTab === 'admin' ? 'active' : ''}" data-tab="admin">⚙️ الإدارة</div>` : ''}
                    <div class="nav-item ${this.currentTab === 'mydashboard' ? 'active' : ''}" data-tab="mydashboard">📋 لوحتي</div>
                </nav>
                <div class="main-container">
                    <div id="search-filter-panel"></div>
                    <div id="dynamic-content"></div>
                </div>
                <div class="fab" id="fabButton">+</div>
                <div id="addItemModal" class="modal-overlay">
                    <div class="modal-content">
                        <div class="modal-header"><span class="close-modal" id="closeModalBtn">&times;</span><h4>➕ إضافة سلعة جديدة</h4></div>
                        <div class="modal-body">
                            <div class="form-group"><label>العنوان</label><input type="text" id="itemTitle" placeholder="مثال: آيفون 14 برو"></div>
                            <div class="form-group"><label>السعر (دج)</label><input type="number" id="itemPrice" placeholder="0.00"></div>
                            <div class="form-group"><label>التصنيف</label><select id="itemCategory"><option>إلكترونيات</option><option>ملابس</option><option>عقارات</option><option>سيارات</option><option>أخرى</option></select></div>
                            <div class="form-group"><label>المنطقة</label><input type="text" id="itemRegion" placeholder="مثال: الجزائر العاصمة"></div>
                            <div class="form-group"><label>رقم الهاتف</label><input type="tel" id="itemPhone" placeholder="05xxxxxxxx"></div>
                            <div class="form-group"><label>وصف مختصر</label><textarea id="itemDesc" rows="2"></textarea></div>
                            <div class="form-group"><label>صورة السلعة</label><input type="file" id="itemImage" accept="image/*"><img id="imagePreview" class="image-preview" style="display:none;"></div>
                            <button class="btn-primary" id="submitNewItemBtn">تأكيد النشر للمراجعة</button>
                        </div>
                    </div>
                </div>
            `;
            this.attachEvents();
            this.render(this.currentTab);
        },

        attachEvents() {
            document.querySelectorAll('.nav-item').forEach(el => {
                el.addEventListener('click', () => this.switchTab(el.dataset.tab));
            });
            const fab = document.getElementById('fabButton');
            if (fab) fab.addEventListener('click', () => this.openProductModal());
            const closeBtn = document.getElementById('closeModalBtn');
            if (closeBtn) closeBtn.addEventListener('click', () => this.closeModal());
            const modal = document.getElementById('addItemModal');
            if (modal) modal.addEventListener('click', (e) => { if (e.target === modal) this.closeModal(); });
            const submitBtn = document.getElementById('submitNewItemBtn');
            if (submitBtn) submitBtn.addEventListener('click', () => this.submitProduct());
            const imgInput = document.getElementById('itemImage');
            if (imgInput) imgInput.addEventListener('change', (e) => this.previewImage(e, 'imagePreview'));
        },

        previewImage(e, previewId) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    const img = document.getElementById(previewId);
                    img.src = ev.target.result;
                    img.style.display = 'block';
                };
                reader.readAsDataURL(file);
            }
        },

        openProductModal() {
            const modal = document.getElementById('addItemModal');
            if (modal) modal.style.display = 'flex';
            document.getElementById('itemTitle').value = '';
            document.getElementById('itemPrice').value = '';
            document.getElementById('itemRegion').value = '';
            document.getElementById('itemPhone').value = '';
            document.getElementById('itemDesc').value = '';
            document.getElementById('itemImage').value = '';
            document.getElementById('imagePreview').style.display = 'none';
        },
        closeModal() { const modal = document.getElementById('addItemModal'); if (modal) modal.style.display = 'none'; },

        submitProduct() {
            const title = document.getElementById('itemTitle').value.trim();
            const price = document.getElementById('itemPrice').value.trim();
            const category = document.getElementById('itemCategory').value;
            const region = document.getElementById('itemRegion').value.trim();
            const phone = document.getElementById('itemPhone').value.trim();
            const desc = document.getElementById('itemDesc').value.trim();
            const image = document.getElementById('imagePreview').src || '';
            if (!title || !price || !region || !phone) return alert("جميع الحقول الأساسية مطلوبة");
            if (!/^[0-9]{9,10}$/.test(phone.replace(/\s/g, ''))) return alert("رقم هاتف غير صحيح");
            const newProduct = {
                id: Date.now(),
                title, price, category, region, phone,
                description: desc || "لا يوجد وصف",
                image,
                status: "pending",
                ownerEmail: currentUser.email
            };
            AppDB.products.push(newProduct);
            saveData();
            alert("✅ تم إرسال السلعة للمراجعة");
            this.closeModal();
            if (this.currentTab === 'products' || this.currentTab === 'mydashboard' || (currentUser.role === 'admin' && this.currentTab === 'admin')) this.render(this.currentTab);
        },

        // إضافة خدمة من لوحة المستخدم (تذهب للمراجعة) أو من الأدمن (معتمدة)
        addServiceFromUser(serviceData) {
            AppDB.services.push({ ...serviceData, status: "pending", ownerEmail: currentUser.email });
            saveData();
            alert("تم إرسال الخدمة للمراجعة");
            this.render('mydashboard');
        },

        addServiceDirect(serviceData) {
            AppDB.services.push({ ...serviceData, status: "approved", ownerEmail: currentUser.email });
            saveData();
            alert("تم نشر الخدمة مباشرة");
            this.render('admin');
        },

        switchTab(tab) {
            this.currentTab = tab;
            this.viewingShopEmail = null;
            this.renderMainApp(); // إعادة بناء الواجهة لتحديث active class
        },

        filterItems(items) {
            let filtered = items;
            if (this.filterCategory !== 'الكل') filtered = filtered.filter(i => i.category === this.filterCategory);
            if (this.searchKeyword.trim()) {
                const kw = this.searchKeyword.trim().toLowerCase();
                filtered = filtered.filter(i => (i.title || i.name).toLowerCase().includes(kw) || (i.description && i.description.toLowerCase().includes(kw)) || (i.region && i.region.toLowerCase().includes(kw)));
            }
            return filtered;
        },

        renderSearchPanel() {
            const panel = document.getElementById('search-filter-panel');
            if (!panel) return;
            if ((this.currentTab === 'products' || this.currentTab === 'services') && !this.viewingShopEmail) {
                panel.style.display = 'flex';
                let categories = ['الكل'];
                let items = this.currentTab === 'products' ? AppDB.products.filter(p => p.status === 'approved') : AppDB.services.filter(s => s.status === 'approved');
                items.forEach(i => { if (i.category && !categories.includes(i.category)) categories.push(i.category); });
                panel.innerHTML = `
                    <div class="search-bar">
                        <input type="text" id="searchInput" class="search-input" placeholder="🔍 بحث..." value="${this.searchKeyword}">
                        <select id="categoryFilter" class="filter-category">${categories.map(c => `<option value="${c}" ${this.filterCategory===c?'selected':''}>${c==='الكل'?'جميع التصنيفات':c}</option>`).join('')}</select>
                        <button id="searchBtn" class="search-btn">بحث</button>
                        <button id="resetSearchBtn" class="reset-btn">إعادة تعيين</button>
                    </div>`;
                document.getElementById('searchBtn').onclick = () => {
                    this.searchKeyword = document.getElementById('searchInput').value;
                    this.filterCategory = document.getElementById('categoryFilter').value;
                    this.render(this.currentTab);
                };
                document.getElementById('resetSearchBtn').onclick = () => {
                    this.searchKeyword = ''; this.filterCategory = 'الكل';
                    this.render(this.currentTab);
                };
                document.getElementById('searchInput').onkeypress = (e) => { if(e.key === 'Enter') document.getElementById('searchBtn').click(); };
            } else panel.style.display = 'none';
        },

        renderShopPage(shopEmail) {
            this.viewingShopEmail = shopEmail;
            const shop = AppDB.shops.find(s => s.email === shopEmail);
            if (!shop) return;
            const shopProducts = AppDB.products.filter(p => p.status === 'approved' && p.ownerEmail === shopEmail);
            const shopServices = AppDB.services.filter(s => s.status === 'approved' && s.ownerEmail === shopEmail);
            const container = document.getElementById('dynamic-content');
            const panelDiv = document.getElementById('search-filter-panel');
            if (panelDiv) panelDiv.style.display = 'none';
            let html = `<div class="back-link" onclick="appLogic.switchTab('shops')">← العودة إلى قائمة المتاجر</div>
                        <div class="shop-profile-header">
                            <h2>🏪 ${this.escapeHtml(shop.name)}</h2>
                            <p>📍 ${this.escapeHtml(shop.region || 'غير محدد')} | 📞 ${this.escapeHtml(shop.phone || 'غير متوفر')}</p>
                            <p>📧 ${this.escapeHtml(shop.email)}</p>
                            ${shop.verified ? '<span style="color:green">✓ متجر موثوق</span>' : ''}
                        </div>`;
            if (shopProducts.length === 0 && shopServices.length === 0) html += '<div class="empty-state">لا توجد منتجات أو خدمات لهذا المتجر بعد.</div>';
            if (shopProducts.length) {
                html += `<h3>📦 منتجات المتجر (${shopProducts.length})</h3>`;
                shopProducts.forEach(p => { html += this.renderItemCard(p, 'product'); });
            }
            if (shopServices.length) {
                html += `<h3>🛠 خدمات المتجر (${shopServices.length})</h3>`;
                shopServices.forEach(s => { html += this.renderItemCard(s, 'service'); });
            }
            container.innerHTML = html;
        },

        render(tab) {
            if (this.viewingShopEmail) return this.renderShopPage(this.viewingShopEmail);
            const container = document.getElementById('dynamic-content');
            if (!container) return;
            this.renderSearchPanel();
            let html = '';
            if (tab === 'products') {
                const approved = AppDB.products.filter(p => p.status === 'approved');
                const filtered = this.filterItems(approved);
                html = `<h3>🛍️ السلع (${filtered.length})</h3>`;
                if (!filtered.length) html += '<div class="empty-state">لا توجد سلع معتمدة</div>';
                filtered.forEach(p => html += this.renderItemCard(p, 'product'));
            } 
            else if (tab === 'services') {
                const approved = AppDB.services.filter(s => s.status === 'approved');
                const filtered = this.filterItems(approved);
                html = `<h3>🔧 الخدمات (${filtered.length})</h3>`;
                if (!filtered.length) html += '<div class="empty-state">لا توجد خدمات معتمدة</div>';
                filtered.forEach(s => html += this.renderItemCard(s, 'service'));
            }
            else if (tab === 'shops') {
                html = `<h3>🏢 المتاجر (${AppDB.shops.length})</h3>`;
                if (!AppDB.shops.length) html += '<div class="empty-state">لا توجد متاجر</div>';
                AppDB.shops.forEach(shop => {
                    html += `
                        <div class="card">
                            <div class="card-content">
                                <div class="product-details">
                                    <strong>🏪 ${this.escapeHtml(shop.name)}</strong><br>
                                    <span class="category-badge">متجر</span><br>
                                    <div class="region-phone">📍 ${this.escapeHtml(shop.region || 'غير محدد')} | 📞 ${this.escapeHtml(shop.phone || 'غير متوفر')}</div>
                                    <small>📧 ${this.escapeHtml(shop.email)}</small><br>
                                    <button class="btn-success" style="margin-top:8px" onclick="appLogic.renderShopPage('${shop.email}')">🏪 زيارة المتجر</button>
                                    ${currentUser.email === shop.ownerEmail ? '<br><button class="btn-secondary" style="margin-top:5px" onclick="appLogic.editShop()">✏️ تعديل متجري</button>' : ''}
                                </div>
                            </div>
                        </div>
                    `;
                });
                // نموذج إنشاء متجر للمستخدم العادي إذا لم يكن لديه متجر
                const myShop = AppDB.shops.find(s => s.ownerEmail === currentUser.email);
                if (!myShop && currentUser.role !== 'admin') {
                    html += `<div class="admin-section"><h4>🏪 إنشاء متجرك الخاص</h4>
                        <input type="text" id="newShopName" placeholder="اسم المتجر"><br><br>
                        <input type="text" id="newShopRegion" placeholder="المنطقة"><br><br>
                        <input type="tel" id="newShopPhone" placeholder="رقم الهاتف"><br><br>
                        <button class="btn-primary" onclick="appLogic.createShop()">إنشاء متجر</button>
                    </div>`;
                }
            }
            else if (tab === 'admin' && currentUser.role === 'admin') {
                const pendingProducts = AppDB.products.filter(p => p.status === 'pending');
                const pendingServices = AppDB.services.filter(s => s.status === 'pending');
                html = `<div class="admin-section"><h4>🛠 طلبات المراجعة</h4>`;
                if (pendingProducts.length === 0 && pendingServices.length === 0) html += "<p>لا توجد طلبات جديدة</p>";
                pendingProducts.forEach(p => {
                    html += `<div class="card"><div class="card-header"><div><strong>${this.escapeHtml(p.title)}</strong><br>💰 ${p.price} | 📍 ${p.region} | 📞 ${p.phone}<br><small>التصنيف: ${p.category} | المالك: ${p.ownerEmail}</small></div>
                    <div><button class="btn-success" onclick="appLogic.approveItem(${p.id}, 'product')">✅ اعتماد</button><button class="btn-danger" onclick="appLogic.deleteItem(${p.id}, 'product')">🗑 حذف</button></div></div>${p.image ? `<img src="${p.image}" style="width:50px; margin:5px;">` : ''}</div>`;
                });
                pendingServices.forEach(s => {
                    html += `<div class="card"><div class="card-header"><div><strong>${this.escapeHtml(s.name)}</strong><br>💰 ${s.price} | 📍 ${s.region} | 📞 ${s.phone}<br><small>التصنيف: ${s.category} | المالك: ${s.ownerEmail}</small></div>
                    <div><button class="btn-success" onclick="appLogic.approveItem(${s.id}, 'service')">✅ اعتماد</button><button class="btn-danger" onclick="appLogic.deleteItem(${s.id}, 'service')">🗑 حذف</button></div></div>${s.image ? `<img src="${s.image}" style="width:50px; margin:5px;">` : ''}</div>`;
                });
                html += `<hr><h4>➕ إضافة خدمة جديدة (تنشر مباشرة)</h4>
                    <div class="form-group"><input type="text" id="serviceName" placeholder="اسم الخدمة"></div>
                    <div class="form-group"><input type="number" id="servicePrice" placeholder="السعر"></div>
                    <div class="form-group"><select id="serviceCategory"><option>خدمات منزلية</option><option>تعليم</option><option>صيانة</option></select></div>
                    <div class="form-group"><input type="text" id="serviceRegion" placeholder="المنطقة"></div>
                    <div class="form-group"><input type="tel" id="servicePhone" placeholder="رقم الهاتف"></div>
                    <div class="form-group"><textarea id="serviceDesc" rows="2" placeholder="وصف"></textarea></div>
                    <div class="form-group"><label>صورة</label><input type="file" id="serviceImage"><img id="serviceImagePreview" class="image-preview" style="display:none;"></div>
                    <button class="btn-primary" id="addServiceBtn">➕ نشر الخدمة</button>
                </div>`;
                setTimeout(() => {
                    const imgInput = document.getElementById('serviceImage');
                    if(imgInput) imgInput.onchange = (e) => this.previewImage(e, 'serviceImagePreview');
                    const btn = document.getElementById('addServiceBtn');
                    if(btn) btn.onclick = () => {
                        const name = document.getElementById('serviceName').value.trim();
                        const price = document.getElementById('servicePrice').value.trim();
                        const category = document.getElementById('serviceCategory').value;
                        const region = document.getElementById('serviceRegion').value.trim();
                        const phone = document.getElementById('servicePhone').value.trim();
                        const desc = document.getElementById('serviceDesc').value.trim();
                        const image = document.getElementById('serviceImagePreview').src || '';
                        if(!name || !price || !region || !phone) return alert("املأ جميع الحقول");
                        this.addServiceDirect({ id: Date.now(), name, price, category, region, phone, description: desc, image });
                    };
                }, 10);
            }
            else if (tab === 'mydashboard') {
                const myProducts = AppDB.products.filter(p => p.ownerEmail === currentUser.email);
                const myServices = AppDB.services.filter(s => s.ownerEmail === currentUser.email);
                html = `<div class="user-dashboard"><h3>📋 لوحة تحكمي</h3>
                    <h4>➕ إضافة خدمة جديدة (تذهب للمراجعة)</h4>
                    <div class="form-group"><input type="text" id="userServiceName" placeholder="اسم الخدمة"></div>
                    <div class="form-group"><input type="number" id="userServicePrice" placeholder="السعر"></div>
                    <div class="form-group"><select id="userServiceCategory"><option>خدمات منزلية</option><option>تعليم</option><option>صيانة</option></select></div>
                    <div class="form-group"><input type="text" id="userServiceRegion" placeholder="المنطقة"></div>
                    <div class="form-group"><input type="tel" id="userServicePhone" placeholder="رقم الهاتف"></div>
                    <div class="form-group"><textarea id="userServiceDesc" rows="2" placeholder="وصف"></textarea></div>
                    <div class="form-group"><label>صورة</label><input type="file" id="userServiceImage"><img id="userServiceImagePreview" class="image-preview" style="display:none;"></div>
                    <button class="btn-primary" id="addUserServiceBtn">➕ إضافة خدمة (للمراجعة)</button>
                    <hr>
                    <h4>📦 منتجاتي</h4>`;
                if (myProducts.length === 0) html += "<p>لا توجد منتجات</p>";
                myProducts.forEach(p => {
                    html += `<div class="card"><div class="card-content"><div class="product-details"><strong>${this.escapeHtml(p.title)}</strong> - ${p.price} دج - الحالة: ${p.status === 'approved' ? '✅ معتمدة' : '⏳ قيد المراجعة'}<br><button class="btn-danger" onclick="appLogic.deleteMyItem(${p.id}, 'product')">حذف</button></div></div></div>`;
                });
                html += `<h4>🛠 خدماتي</h4>`;
                if (myServices.length === 0) html += "<p>لا توجد خدمات</p>";
                myServices.forEach(s => {
                    html += `<div class="card"><div class="card-content"><div class="product-details"><strong>${this.escapeHtml(s.name)}</strong> - ${s.price} دج - الحالة: ${s.status === 'approved' ? '✅ معتمدة' : '⏳ قيد المراجعة'}<br><button class="btn-danger" onclick="appLogic.deleteMyItem(${s.id}, 'service')">حذف</button></div></div></div>`;
                });
                html += `</div>`;
                // ربط حدث إضافة خدمة المستخدم
                setTimeout(() => {
                    const imgInput = document.getElementById('userServiceImage');
                    if(imgInput) imgInput.onchange = (e) => this.previewImage(e, 'userServiceImagePreview');
                    const btn = document.getElementById('addUserServiceBtn');
                    if(btn) btn.onclick = () => {
                        const name = document.getElementById('userServiceName').value.trim();
                        const price = document.getElementById('userServicePrice').value.trim();
                        const category = document.getElementById('userServiceCategory').value;
                        const region = document.getElementById('userServiceRegion').value.trim();
                        const phone = document.getElementById('userServicePhone').value.trim();
                        const desc = document.getElementById('userServiceDesc').value.trim();
                        const image = document.getElementById('userServiceImagePreview').src || '';
                        if(!name || !price || !region || !phone) return alert("املأ جميع الحقول");
                        this.addServiceFromUser({ id: Date.now(), name, price, category, region, phone, description: desc, image });
                    };
                }, 10);
            }
            container.innerHTML = html;
        },

        renderItemCard(item, type) {
            const title = type === 'product' ? item.title : item.name;
            return `
                <div class="card">
                    <div class="card-content">
                        ${item.image ? `<img src="${item.image}" class="product-image">` : `<div class="product-image" style="background:#ddd; display:flex; align-items:center; justify-content:center;">📷</div>`}
                        <div class="product-details">
                            <span class="price-tag">💰 ${item.price} دج</span>
                            <span class="category-badge">${this.escapeHtml(item.category)}</span>
                            <div><strong>${this.escapeHtml(title)}</strong></div>
                            <div class="region-phone">📍 ${this.escapeHtml(item.region)} | 📞 ${this.escapeHtml(item.phone)}</div>
                            <p style="font-size:12px;">${this.escapeHtml(item.description || '')}</p>
                            <button class="btn-primary" style="background:#e4e6eb; color:#1c1e21;" onclick="alert('📞 اتصل على: ${item.phone}')">📞 اتصل بالبائع</button>
                        </div>
                    </div>
                </div>
            `;
        },

        approveItem(id, type) {
            if (type === 'product') { let p = AppDB.products.find(p=>p.id===id); if(p) p.status='approved'; }
            else { let s = AppDB.services.find(s=>s.id===id); if(s) s.status='approved'; }
            saveData(); alert("تم الاعتماد"); this.render('admin'); this.render('mydashboard');
            if (this.currentTab === 'products' || this.currentTab === 'services') this.render(this.currentTab);
        },
        deleteItem(id, type) {
            if (!confirm("حذف نهائي؟")) return;
            if (type === 'product') AppDB.products = AppDB.products.filter(p=>p.id!==id);
            else AppDB.services = AppDB.services.filter(s=>s.id!==id);
            saveData(); alert("تم الحذف"); this.render('admin'); this.render('mydashboard');
            if (this.currentTab === 'products' || this.currentTab === 'services') this.render(this.currentTab);
        },
        deleteMyItem(id, type) {
            if (!confirm("حذف منتجك/خدمتك؟")) return;
            if (type === 'product') AppDB.products = AppDB.products.filter(p=>!(p.id===id && p.ownerEmail===currentUser.email));
            else AppDB.services = AppDB.services.filter(s=>!(s.id===id && s.ownerEmail===currentUser.email));
            saveData(); alert("تم الحذف"); this.render('mydashboard');
            if (this.currentTab === 'products' || this.currentTab === 'services') this.render(this.currentTab);
        },
        createShop() {
            const name = document.getElementById('newShopName').value.trim();
            const region = document.getElementById('newShopRegion').value.trim();
            const phone = document.getElementById('newShopPhone').value.trim();
            if (!name) return alert("اسم المتجر مطلوب");
            if (AppDB.shops.find(s => s.ownerEmail === currentUser.email)) return alert("لديك متجر بالفعل");
            AppDB.shops.push({
                id: Date.now(),
                name,
                email: currentUser.email,
                region,
                phone,
                verified: false,
                ownerEmail: currentUser.email
            });
            saveData();
            alert("تم إنشاء متجرك بنجاح");
            this.render('shops');
        },
        editShop() {
            alert("يمكن تعديل المتجر يدوياً من خلال قاعدة البيانات، أو يمكن إضافة واجهة تعديل لاحقاً.");
        },
        logout() { logout(); },
        escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]); }
    };

    window.appLogic = AppLogic;

    function renderAuthScreen() {
        const root = document.getElementById('appRoot');
        root.innerHTML = `
            <div class="auth-container" id="authContainer">
                <h2 style="text-align:center">🔐 مرحباً بك في Lite Market</h2>
                <div id="authForm">
                    <div class="form-group"><input type="email" id="loginEmail" placeholder="البريد الإلكتروني"></div>
                    <div class="form-group"><input type="password" id="loginPassword" placeholder="كلمة المرور"></div>
                    <button class="btn-primary" id="loginBtn">تسجيل الدخول</button>
                    <div class="toggle-auth" id="showRegister">ليس لديك حساب؟ سجل الآن</div>
                </div>
            </div>
        `;
        document.getElementById('loginBtn').onclick = () => {
            const email = document.getElementById('loginEmail').value;
            const pass = document.getElementById('loginPassword').value;
            const res = login(email, pass);
            if (res.success) appLogic.init();
            else alert(res.error);
        };
        document.getElementById('showRegister').onclick = () => {
            document.getElementById('authForm').innerHTML = `
                <div class="form-group"><input type="text" id="regName" placeholder="الاسم الكامل"></div>
                <div class="form-group"><input type="email" id="regEmail" placeholder="البريد الإلكتروني"></div>
                <div class="form-group"><input type="password" id="regPassword" placeholder="كلمة المرور"></div>
                <button class="btn-primary" id="registerBtn">إنشاء حساب</button>
                <div class="toggle-auth" id="showLogin">لديك حساب؟ سجل دخول</div>
            `;
            document.getElementById('registerBtn').onclick = () => {
                const name = document.getElementById('regName').value;
                const email = document.getElementById('regEmail').value;
                const pass = document.getElementById('regPassword').value;
                if (!name || !email || !pass) return alert("املأ جميع الحقول");
                const res = register(email, pass, name);
                if (res.success) { alert("تم التسجيل بنجاح، يمكنك تسجيل الدخول"); renderAuthScreen(); }
                else alert(res.error);
            };
            document.getElementById('showLogin').onclick = () => renderAuthScreen();
        };
    }

    // بدء التشغيل
    window.appLogic = AppLogic;
    document.addEventListener('DOMContentLoaded', () => {
        loadData();
        if (checkSession()) AppLogic.init();
        else renderAuthScreen();
    });
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>هدهد ماركت - سوق مسعد | منصة متكاملة</title>
    <link rel="icon" type="image/png" href="https://i.postimg.cc/3NZ6WbKP/235264114-157440589754796-4426353709702884299-n-removebg-preview.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Tajawal', sans-serif; background: #f5f7fa; color: #1e2a3e; line-height: 1.4; }
        .flat-card { background: white; border: 1px solid #e2e8f0; border-radius: 16px; transition: 0.1s linear; }
        .flat-card:hover { border-color: #cbd5e1; }
        .btn { border: none; padding: 8px 18px; border-radius: 40px; font-weight: 600; cursor: pointer; font-family: inherit; transition: 0.1s; }
        .btn-primary { background: #2563eb; color: white; }
        .btn-outline { background: transparent; border: 1px solid #2563eb; color: #2563eb; }
        .btn-danger { background: #dc2626; color: white; }
        .btn-sm { padding: 6px 12px; font-size: 0.8rem; }
        .badge { background: #eef2ff; color: #1e40af; padding: 4px 12px; border-radius: 30px; font-size: 0.75rem; font-weight: 600; display: inline-block; }
        .app-header { background: #1e3a8a; padding: 12px 24px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; position: sticky; top: 0; z-index: 100; }
        .logo-area { display: flex; align-items: center; gap: 8px; color: white; font-weight: 800; font-size: 1.4rem; }
        .logo-area img { width: 42px; height: 42px; object-fit: contain; }
        .user-info { display: flex; align-items: center; gap: 12px; background: rgba(255,255,255,0.15); padding: 5px 16px; border-radius: 40px; }
        .user-info span { color: white; font-weight: 500; }
        .nav-bar { background: white; border-bottom: 1px solid #e2e8f0; padding: 0 20px; display: flex; flex-wrap: wrap; gap: 4px; overflow-x: auto; }
        .nav-link { padding: 14px 18px; font-weight: 600; color: #334155; cursor: pointer; border-bottom: 3px solid transparent; transition: 0.1s; white-space: nowrap; }
        .nav-link.active { color: #2563eb; border-bottom-color: #2563eb; }
        .main-container { max-width: 1300px; margin: 20px auto; padding: 0 20px; }
        .filter-row { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 24px; align-items: center; }
        .search-input { flex: 2; min-width: 200px; padding: 10px 18px; border-radius: 40px; border: 1px solid #cbd5e1; background: white; font-family: inherit; }
        .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 20px; margin-top: 16px; }
        .product-card { background: white; border-radius: 20px; border: 1px solid #e2e8f0; overflow: hidden; cursor: pointer; transition: 0.1s; }
        .product-card:hover { transform: translateY(-2px); border-color: #94a3b8; }
        .product-img { width: 100%; height: 170px; object-fit: cover; background: #f8fafc; }
        .product-info { padding: 14px; }
        .product-price { font-size: 1.3rem; font-weight: 800; color: #2563eb; margin: 6px 0; }
        .shop-vertical-item { display: flex; gap: 16px; background: white; border: 1px solid #e2e8f0; border-radius: 20px; padding: 12px; margin-bottom: 12px; cursor: pointer; align-items: center; }
        .shop-avatar { width: 70px; height: 70px; border-radius: 20px; object-fit: cover; }
        .chat-layout { display: flex; gap: 20px; flex-wrap: wrap; background: white; border-radius: 24px; border: 1px solid #e2e8f0; overflow: hidden; }
        .chat-sidebar { flex: 1; min-width: 260px; background: #fafcff; border-left: 1px solid #e2e8f0; padding: 16px; }
        .chat-main { flex: 3; display: flex; flex-direction: column; background: white; min-height: 500px; }
        .chat-messages { flex: 1; padding: 16px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; max-height: 450px; }
        .message-bubble { max-width: 80%; padding: 8px 14px; border-radius: 24px; background: #f1f5f9; align-self: flex-start; }
        .message-bubble.me { background: #2563eb; color: white; align-self: flex-end; }
        .chat-input-area { display: flex; gap: 12px; padding: 16px; border-top: 1px solid #e2e8f0; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(2px); z-index: 1000; align-items: center; justify-content: center; }
        .modal-card { background: white; width: 90%; max-width: 550px; border-radius: 28px; max-height: 85vh; overflow-y: auto; }
        .modal-header { padding: 16px 20px; border-bottom: 1px solid #e2e8f0; display: flex; justify-content: space-between; font-weight: 800; }
        .modal-body { padding: 20px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: 600; }
        .unread-dot { width: 10px; height: 10px; background: #ef4444; border-radius: 50%; display: inline-block; margin-right: 6px; }
        .footer { text-align: center; padding: 24px; color: #64748b; border-top: 1px solid #e2e8f0; margin-top: 40px; }
        @media (max-width: 700px) { .chat-layout { flex-direction: column; } }
    </style>
</head>
<body>

<header class="app-header">
    <div class="logo-area">
        <img src="https://i.postimg.cc/3NZ6WbKP/235264114-157440589754796-4426353709702884299-n-removebg-preview.png" alt="logo">
        <span>هدهد ماركت</span>
    </div>
    <div class="user-info" id="userInfo">
        <span id="userNameSpan">زائر</span>
        <button id="authBtn" class="btn btn-outline" style="background:white; color:#1e3a8a;">دخول</button>
    </div>
</header>

<nav class="nav-bar" id="navBar">
    <div class="nav-link active" data-nav="explore">🏠 الرئيسية</div>
    <div class="nav-link" data-nav="services">🔧 الخدمات</div>
    <div class="nav-link" data-nav="shops">🏪 دليل المحلات</div>
    <div class="nav-link" data-nav="chats">💬 الدردشة</div>
    <div class="nav-link" data-nav="notifications">🔔 الإشعارات</div>
    <div class="nav-link" id="myShopNav" style="display:none;" data-nav="myShop">🏬 متجري</div>
    <div class="nav-link" id="adminNav" style="display:none;" data-nav="admin">👑 لوحة الأدمن</div>
</nav>

<main class="main-container" id="mainApp">
    <!-- dynamic content -->
</main>

<div class="footer">
    <img src="https://i.postimg.cc/3NZ6WbKP/235264114-157440589754796-4426353709702884299-n-removebg-preview.png" width="28">
    <p>📍 هدهد ماركت - سوق مسعد | نظام متكامل مع Firebase | متاجر، خدمات، دردشة، طلبات متاجر</p>
</div>

<div id="itemModal" class="modal"><div class="modal-card"><div class="modal-header"><span id="modalTitle">تفاصيل</span><button class="close-modal" onclick="closeModal()" style="background:none; border:none; font-size:24px;">&times;</button></div><div class="modal-body" id="modalBody"></div></div></div>

<script>
    // ==================== Firebase Configuration (استبدل بمفاتيحك) ====================
    const firebaseConfig = {
        apiKey: "AIzaSyAuECTMZfc3ode7iIxXEdz72My3hH_v5jE",
        authDomain: "hodhod-c4aa2.firebaseapp.com",
        projectId: "hodhod-c4aa2",
        storageBucket: "hodhod-c4aa2.firebasestorage.app",
        messagingSenderId: "579573823574",
        appId: "1:579573823574:web:106bd5ebe580f3b0ace3f7"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();
    const storage = firebase.storage();

    // ==================== Global State ====================
    let currentUser = null;
    let currentNav = "explore";
    let currentSubTab = "local";
    let searchKeyword = "";
    let currentChatId = null;
    let unsubscribeChat = null;

    // ==================== Helper Functions ====================
    async function updateUIForRole() {
        const logged = !!currentUser;
        const role = currentUser?.role;
        // Show "My Shop" for ALL logged users (registered, merchant, admin)
        document.getElementById("myShopNav").style.display = logged ? "flex" : "none";
        document.getElementById("adminNav").style.display = (logged && role === "admin") ? "flex" : "none";
        document.getElementById("userNameSpan").innerText = logged ? currentUser.name : "زائر";
        document.getElementById("authBtn").innerText = logged ? "تسجيل خروج" : "دخول";
        if (!logged && (currentNav === "myShop" || currentNav === "admin" || currentNav === "notifications")) {
            switchNav("explore");
        } else {
            renderCurrentView();
        }
    }

    function logout() { auth.signOut(); currentUser = null; updateUIForRole(); }

    function closeModal() { document.getElementById("itemModal").style.display = "none"; }

    // ==================== Auth Modal (Login/Register) ====================
    function openModalAuth() {
        const html = `
            <div class="form-group"><label>البريد الإلكتروني</label><input id="authEmail" type="email" placeholder="example@domain.com" class="search-input" style="width:100%"></div>
            <div class="form-group"><label>كلمة المرور</label><input id="authPass" type="password" class="search-input" style="width:100%"></div>
            <div id="authExtra" style="display:none; margin-top:12px;">
                <input id="regName" placeholder="الاسم الكامل" class="search-input" style="width:100%; margin-bottom:8px">
                <select id="regRole" class="search-input"><option value="registered">مستخدم عادي</option><option value="merchant">تاجر (طلب فتح متجر)</option></select>
                <div id="merchantFields" style="display:none; margin-top:8px;">
                    <input id="shopNameReg" placeholder="اسم المتجر*" class="search-input"><input id="shopPhoneReg" placeholder="رقم الهاتف*" class="search-input">
                    <input id="shopCatReg" placeholder="تصنيف المتجر" class="search-input">
                </div>
            </div>
            <button id="submitAuthBtn" class="btn btn-primary" style="width:100%; margin-top:12px;">دخول</button>
            <button id="googleAuthBtn" class="btn btn-outline" style="width:100%; margin-top:8px;"><i class="fab fa-google"></i> جوجل</button>
            <p style="margin-top:12px;"><a href="#" id="toggleAuthMode">إنشاء حساب جديد</a></p>
        `;
        document.getElementById("modalTitle").innerText = "تسجيل الدخول";
        document.getElementById("modalBody").innerHTML = html;
        document.getElementById("itemModal").style.display = "flex";
        let isLogin = true;
        const toggleLink = document.getElementById("toggleAuthMode");
        const authExtra = document.getElementById("authExtra");
        const submitBtn = document.getElementById("submitAuthBtn");
        const roleSelect = document.getElementById("regRole");
        const merchantDiv = document.getElementById("merchantFields");
        if(roleSelect) roleSelect.addEventListener("change", (e) => { merchantDiv.style.display = e.target.value === "merchant" ? "block" : "none"; });
        toggleLink.onclick = (e) => {
            e.preventDefault();
            isLogin = !isLogin;
            document.getElementById("modalTitle").innerText = isLogin ? "تسجيل الدخول" : "إنشاء حساب";
            authExtra.style.display = isLogin ? "none" : "block";
            submitBtn.innerText = isLogin ? "دخول" : "تسجيل";
        };
        submitBtn.onclick = async () => {
            const email = document.getElementById("authEmail").value;
            const pass = document.getElementById("authPass").value;
            if(!email || !pass) return alert("املأ البريد وكلمة المرور");
            if(isLogin) {
                try {
                    const cred = await auth.signInWithEmailAndPassword(email, pass);
                    const doc = await db.collection("users").doc(cred.user.uid).get();
                    if(!doc.exists) throw new Error("بيانات غير مكتملة");
                    currentUser = { uid: cred.user.uid, ...doc.data() };
                    closeModal();
                    updateUIForRole();
                } catch(e) { alert(e.message); }
            } else {
                const name = document.getElementById("regName").value;
                const role = document.getElementById("regRole").value;
                if(!name) return alert("أدخل الاسم");
                if(role === "merchant") {
                    const shopName = document.getElementById("shopNameReg").value;
                    const shopPhone = document.getElementById("shopPhoneReg").value;
                    if(!shopName || !shopPhone) return alert("اسم المتجر والهاتف مطلوبان");
                    try {
                        const cred = await auth.createUserWithEmailAndPassword(email, pass);
                        // create shop application (pending)
                        await db.collection("shop_applications").add({
                            userId: cred.user.uid,
                            userName: name,
                            shopName: shopName,
                            phone: shopPhone,
                            cat: document.getElementById("shopCatReg").value || "عام",
                            status: "pending",
                            createdAt: firebase.firestore.FieldValue.serverTimestamp()
                        });
                        await db.collection("users").doc(cred.user.uid).set({
                            name, email, role: "registered", shopId: null,
                            createdAt: firebase.firestore.FieldValue.serverTimestamp()
                        });
                        alert("تم إرسال طلب فتح المتجر للإدارة. سيتم إشعارك عند الموافقة.");
                        closeModal();
                    } catch(e) { alert(e.message); }
                } else {
                    try {
                        const cred = await auth.createUserWithEmailAndPassword(email, pass);
                        await db.collection("users").doc(cred.user.uid).set({ name, email, role: "registered", createdAt: firebase.firestore.FieldValue.serverTimestamp() });
                        alert("تم التسجيل، سجل دخول");
                        closeModal();
                    } catch(e) { alert(e.message); }
                }
            }
        };
        document.getElementById("googleAuthBtn").onclick = async () => {
            const provider = new firebase.auth.GoogleAuthProvider();
            try {
                const result = await auth.signInWithPopup(provider);
                const userDoc = await db.collection("users").doc(result.user.uid).get();
                if(!userDoc.exists) await db.collection("users").doc(result.user.uid).set({ name: result.user.displayName, email: result.user.email, role: "registered", createdAt: new Date() });
                currentUser = { uid: result.user.uid, ...(await db.collection("users").doc(result.user.uid).get()).data() };
                closeModal();
                updateUIForRole();
            } catch(e) { alert(e); }
        };
    }

    // ==================== Admin Functions (Shop Applications) ====================
    async function renderAdminApplications() {
        const appsSnap = await db.collection('shop_applications').where('status', '==', 'pending').get();
        const apps = appsSnap.docs.map(d => ({id: d.id, ...d.data()}));
        let html = '<h3>📋 طلبات فتح المتاجر</h3><div class="cards-grid">';
        if(apps.length === 0) html += '<div class="flat-card" style="padding:20px;">لا توجد طلبات معلقة</div>';
        apps.forEach(app => {
            html += `
                <div class="flat-card" style="padding:15px;">
                    <h4>🏪 ${app.shopName}</h4>
                    <p>👤 مقدم الطلب: ${app.userName}</p>
                    <p>📞 هاتف: ${app.phone}</p>
                    <p>🏷️ التصنيف: ${app.cat || 'عام'}</p>
                    <button class="btn btn-primary" style="background:#10b981; margin-top:8px;" onclick="approveShop('${app.id}', '${app.userId}', '${app.shopName}', '${app.phone}', '${app.cat}')">✅ موافقة وتفعيل المتجر</button>
                </div>
            `;
        });
        html += '</div>';
        return html;
    }

    window.approveShop = async (appId, userId, shopName, phone, cat) => {
        try {
            const shopRef = await db.collection('shops').add({
                name: shopName, phone: phone, cat: cat || 'عام', userId: userId,
                city: 'مسعد', address: 'مسعد', img: 'https://picsum.photos/id/40/400/300',
                cover: 'https://picsum.photos/id/40/800/300', avatar: 'https://picsum.photos/id/40/100/100',
                followers: [], rating: 0, ratingCount: 0,
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });
            await db.collection('users').doc(userId).update({ role: 'merchant', shopId: shopRef.id });
            await db.collection('shop_applications').doc(appId).update({ status: 'approved', reviewedAt: firebase.firestore.FieldValue.serverTimestamp() });
            alert('✅ تم تفعيل المتجر بنجاح! المستخدم أصبح تاجراً.');
            renderAdmin();
        } catch (error) { alert('خطأ: ' + error.message); }
    };

    async function requestShopApplication(shopName, phone, cat, desc) {
        if (!currentUser) return alert('سجل دخول أولاً');
        if (currentUser.role !== 'registered') return alert('أنت بالفعل تاجر أو أدمن');
        await db.collection('shop_applications').add({
            userId: currentUser.uid, userName: currentUser.name,
            shopName: shopName, phone: phone, cat: cat, desc: desc,
            status: 'pending', createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });
        alert('تم إرسال طلبك بنجاح. سيقوم الأدمن بمراجعته قريباً.');
    }

    // ==================== My Shop Page (for all users) ====================
    async function renderMyShop() {
        if (!currentUser) {
            document.getElementById("mainApp").innerHTML = '<div class="flat-card" style="padding:20px;">يرجى تسجيل الدخول أولاً</div>';
            return;
        }
        // Case 1: Merchant with shop
        if (currentUser.role === 'merchant' && currentUser.shopId) {
            const shopDoc = await db.collection('shops').doc(currentUser.shopId).get();
            if (!shopDoc.exists) {
                document.getElementById("mainApp").innerHTML = '<div class="flat-card" style="padding:20px;">لم يتم العثور على متجرك. يرجى التواصل مع الدعم.</div>';
                return;
            }
            const shop = shopDoc.data();
            const productsSnap = await db.collection('products').where('shopId', '==', currentUser.shopId).get();
            const products = productsSnap.docs.map(d => ({ id: d.id, ...d.data() }));
            let productsHtml = '<div class="cards-grid">';
            products.forEach(p => {
                productsHtml += `
                    <div class="flat-card" style="padding:12px;">
                        <img src="${p.imgUrl || 'https://picsum.photos/150/100'}" style="width:100%; border-radius:12px;">
                        <h4>${p.name}</h4>
                        <div class="product-price">${p.price}</div>
                        <button class="btn btn-danger btn-sm" onclick="deleteProduct('${p.id}')">حذف</button>
                    </div>
                `;
            });
            productsHtml += '</div>';
            document.getElementById("mainApp").innerHTML = `
                <div class="flat-card" style="padding:20px; margin-bottom:20px;">
                    <h2>🏬 ${shop.name}</h2>
                    <p>${shop.desc || 'لا يوجد وصف'}</p>
                    <div>📞 ${shop.phone}</div>
                    <div>📍 ${shop.address || 'مسعد'}</div>
                    <div>⭐ التقييم: ${shop.rating || 0}</div>
                    <button class="btn btn-primary" onclick="openAddProductModal()">➕ إضافة سلعة جديدة</button>
                    <button class="btn btn-outline" onclick="alert('تعديل معلومات المتجر قيد التطوير')">✏️ تعديل</button>
                </div>
                <h3>🛍️ منتجاتي</h3>
                ${products.length ? productsHtml : '<div class="flat-card" style="padding:20px;">لا توجد منتجات بعد، أضف منتجك الأول</div>'}
            `;
        }
        // Case 2: Registered user (no shop)
        else if (currentUser.role === 'registered') {
            const pendingApp = await db.collection('shop_applications')
                .where('userId', '==', currentUser.uid)
                .where('status', '==', 'pending')
                .get();
            const hasPending = !pendingApp.empty;
            if (hasPending) {
                document.getElementById("mainApp").innerHTML = `
                    <div class="flat-card" style="padding:20px; text-align:center;">
                        <i class="fas fa-hourglass-half" style="font-size:48px; color:#f59e0b;"></i>
                        <h3>طلب فتح المتجر قيد المراجعة</h3>
                        <p>تم إرسال طلبك بنجاح. سيقوم الأدمن بمراجعته قريباً.</p>
                        <button class="btn btn-outline" onclick="cancelShopApplication()">إلغاء الطلب</button>
                    </div>
                `;
            } else {
                document.getElementById("mainApp").innerHTML = `
                    <div class="flat-card" style="padding:20px; text-align:center;">
                        <i class="fas fa-store" style="font-size:48px; color:#2563eb;"></i>
                        <h3>ليس لديك متجر بعد</h3>
                        <p>يمكنك التقديم لفتح متجرك الخاص على منصة هدهد ماركت.</p>
                        <button class="btn btn-primary" id="showShopRequestFormBtn" style="margin-top:16px;">🏪 تقديم طلب فتح متجر</button>
                    </div>
                    <div id="shopRequestForm" style="display:none; margin-top:20px;" class="flat-card" style="padding:20px;">
                        <h3>بيانات المتجر المطلوب</h3>
                        <div class="form-group"><label>اسم المتجر *</label><input type="text" id="reqShopName" class="search-input" style="width:100%"></div>
                        <div class="form-group"><label>رقم الهاتف *</label><input type="tel" id="reqShopPhone" class="search-input" style="width:100%"></div>
                        <div class="form-group"><label>التصنيف</label><input type="text" id="reqShopCat" class="search-input" style="width:100%" placeholder="ملابس، إلكترونيات..."></div>
                        <div class="form-group"><label>وصف قصير</label><textarea id="reqShopDesc" class="search-input" rows="3" style="width:100%"></textarea></div>
                        <button class="btn btn-primary" id="submitShopRequestBtn">إرسال الطلب</button>
                        <button class="btn btn-outline" id="cancelRequestFormBtn">إلغاء</button>
                    </div>
                `;
                document.getElementById("showShopRequestFormBtn")?.addEventListener("click", () => {
                    document.getElementById("shopRequestForm").style.display = "block";
                    document.getElementById("showShopRequestFormBtn").style.display = "none";
                });
                document.getElementById("cancelRequestFormBtn")?.addEventListener("click", () => {
                    document.getElementById("shopRequestForm").style.display = "none";
                    document.getElementById("showShopRequestFormBtn").style.display = "block";
                });
                document.getElementById("submitShopRequestBtn")?.addEventListener("click", async () => {
                    const shopName = document.getElementById("reqShopName").value.trim();
                    const phone = document.getElementById("reqShopPhone").value.trim();
                    if (!shopName || !phone) return alert("يرجى إدخال اسم المتجر ورقم الهاتف");
                    const cat = document.getElementById("reqShopCat").value.trim() || "عام";
                    const desc = document.getElementById("reqShopDesc").value.trim();
                    await requestShopApplication(shopName, phone, cat, desc);
                    renderMyShop();
                });
            }
        }
        // Case 3: Admin view applications
        else if (currentUser.role === 'admin') {
            const appsHtml = await renderAdminApplications();
            document.getElementById("mainApp").innerHTML = appsHtml;
        }
    }

    window.cancelShopApplication = async () => {
        if (!confirm("هل أنت متأكد من إلغاء طلب فتح المتجر؟")) return;
        const pendingApp = await db.collection('shop_applications')
            .where('userId', '==', currentUser.uid)
            .where('status', '==', 'pending')
            .get();
        if (!pendingApp.empty) {
            await pendingApp.docs[0].ref.delete();
            alert("تم إلغاء الطلب");
            renderMyShop();
        }
    };

    window.deleteProduct = async (productId) => {
        if (confirm("حذف المنتج نهائياً؟")) {
            await db.collection("products").doc(productId).delete();
            renderMyShop();
        }
    };
    window.openAddProductModal = () => { alert("نموذج إضافة منتج سيتم تفعيله قريباً"); };

    // ==================== Explore, Services, Shops (brief) ====================
    async function renderExplore() {
        let productsQuery = db.collection("products");
        if(currentSubTab === "local") productsQuery = productsQuery.where("city", "==", "مسعد");
        else if(currentSubTab === "following" && currentUser) {
            const followedShops = await db.collection("shops").where("followers", "array-contains", currentUser.uid).get();
            const shopIds = followedShops.docs.map(d => d.id);
            if(shopIds.length) productsQuery = productsQuery.where("shopId", "in", shopIds);
            else productsQuery = productsQuery.limit(0);
        }
        const snap = await productsQuery.get();
        let items = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        if(searchKeyword) items = items.filter(i => i.name?.includes(searchKeyword));
        const grid = document.getElementById("exploreGrid");
        if(!grid) return;
        if(items.length === 0) { grid.innerHTML = "<div class='flat-card' style='padding:40px; text-align:center'>لا توجد نتائج</div>"; return; }
        grid.innerHTML = items.map(p => `
            <div class="product-card" onclick="alert('تفاصيل المنتج: ${p.name}')">
                <img class="product-img" data-src="${p.imgUrl || 'https://picsum.photos/200/150'}" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20200%20150'%3E%3C/svg%3E">
                <div class="product-info"><h4>${p.name}</h4><div class="product-price">💰 ${p.price || 'غير محدد'}</div></div>
            </div>
        `).join('');
        const imgObserver = new IntersectionObserver((entries) => {
            entries.forEach(entry => { if(entry.isIntersecting) { const img = entry.target; img.src = img.dataset.src; imgObserver.unobserve(img); } });
        });
        document.querySelectorAll("#exploreGrid .product-img").forEach(img => imgObserver.observe(img));
    }

    async function renderServices() {
        const servicesSnap = await db.collection("services").get();
        const services = servicesSnap.docs.map(d => ({ id: d.id, ...d.data() }));
        const grid = document.getElementById("servicesGrid");
        if(grid) grid.innerHTML = services.map(s => `<div class="product-card" onclick="alert('خدمة: ${s.name}')"><img class="product-img" src="${s.imageUrl || 'https://picsum.photos/200/150'}"><div class="product-info"><h4>${s.name}</h4><div>${s.workingHours || 'ساعات العمل: 9ص-10م'}</div></div></div>`).join('');
    }

    async function renderShopsList() {
        let query = db.collection("shops").orderBy("rating", "desc");
        const snap = await query.get();
        let shops = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        const search = document.getElementById("shopSearch")?.value || "";
        if(search) shops = shops.filter(s => s.name.includes(search));
        const container = document.getElementById("shopsList");
        if(container) container.innerHTML = shops.map(shop => `
            <div class="shop-vertical-item" onclick="alert('عرض المحل: ${shop.name}')">
                <img class="shop-avatar" src="${shop.avatar || 'https://picsum.photos/70/70'}">
                <div style="flex:1"><h3>${shop.name}</h3><div>⭐ ${shop.rating?.toFixed(1) || 0}</div><div>📍 ${shop.city || 'مسعد'}</div></div>
            </div>
        `).join('');
    }

    // ==================== Chat (minimal) ====================
    async function renderChatsInterface() {
        document.getElementById("mainApp").innerHTML = `<div class="chat-layout"><div class="chat-sidebar"><h4>المحادثات</h4><p>قريباً ...</p></div><div class="chat-main"><div class="chat-messages">اختر محادثة</div></div></div>`;
    }

    async function renderNotifications() { document.getElementById("mainApp").innerHTML = `<div class="flat-card" style="padding:20px;">🔔 سيتم عرض الإشعارات هنا قريباً.</div>`; }
    async function renderAdmin() { if(currentUser?.role !== 'admin') return; const appsHtml = await renderAdminApplications(); document.getElementById("mainApp").innerHTML = appsHtml; }

    // ==================== Navigation & Rendering ====================
    async function renderCurrentView() {
        if(currentNav === "explore") {
            document.getElementById("mainApp").innerHTML = `
                <div class="filter-row"><input type="text" id="globalSearch" class="search-input" placeholder="ابحث عن سلعة..." value="${searchKeyword}"></div>
                <div class="tabs-sub" style="display:flex; gap:16px; margin-bottom:20px;"><div class="sub-tab ${currentSubTab === 'local' ? 'active' : ''}" data-sub="local">📍 محلي (مسعد)</div><div class="sub-tab ${currentSubTab === 'following' ? 'active' : ''}" data-sub="following">❤️ أتابعه</div></div>
                <div id="exploreGrid" class="cards-grid"></div>
            `;
            document.getElementById("globalSearch").addEventListener("input", (e) => { searchKeyword = e.target.value; renderExplore(); });
            document.querySelectorAll(".sub-tab").forEach(t => t.addEventListener("click", (e) => { currentSubTab = e.target.dataset.sub; renderCurrentView(); }));
            await renderExplore();
        } else if(currentNav === "services") {
            document.getElementById("mainApp").innerHTML = `<div id="servicesGrid" class="cards-grid"></div>`;
            await renderServices();
        } else if(currentNav === "shops") {
            document.getElementById("mainApp").innerHTML = `<div class="filter-row"><input type="text" id="shopSearch" placeholder="بحث عن محل..." class="search-input"></div><div id="shopsList"></div>`;
            document.getElementById("shopSearch").addEventListener("input", () => renderShopsList());
            await renderShopsList();
        } else if(currentNav === "chats") { await renderChatsInterface(); }
        else if(currentNav === "notifications") { await renderNotifications(); }
        else if(currentNav === "myShop") { await renderMyShop(); }
        else if(currentNav === "admin") { await renderAdmin(); }
    }

    function switchNav(nav) {
        currentNav = nav;
        document.querySelectorAll(".nav-link").forEach(link => link.classList.remove("active"));
        document.querySelector(`.nav-link[data-nav="${nav}"]`)?.classList.add("active");
        renderCurrentView();
    }

    document.querySelectorAll(".nav-link").forEach(link => link.addEventListener("click", () => switchNav(link.dataset.nav)));

    auth.onAuthStateChanged(async (user) => {
        if(user) { const doc = await db.collection("users").doc(user.uid).get(); currentUser = { uid: user.uid, ...doc.data() }; }
        else currentUser = null;
        updateUIForRole();
    });
    document.getElementById("authBtn").onclick = () => { if(currentUser) logout(); else openModalAuth(); };
    window.closeModal = closeModal;
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>هدهد برو POS | التحديث الشامل</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&display=swap');
        :root { --primary: #d97706; --bg-main: #f8fafc; }
        * { font-family: 'Tajawal', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-main); color: #1e293b; }
        .tab-active { background-color: var(--primary); color: white; box-shadow: 0 10px 15px -3px rgba(217, 119, 6, 0.3); }
        #reader { width: 100% !important; border-radius: 1.5rem; overflow: hidden; }
        .low-stock { border-right: 6px solid #ef4444; animation: pulse-red 2s infinite; }
        @keyframes pulse-red { 0% { background-color: #fff; } 50% { background-color: #fee2e2; } 100% { background-color: #fff; } }
    </style>
</head>
<body class="pb-24">

<div id="authOverlay" class="fixed inset-0 z-[5000] bg-white flex items-center justify-center p-6">
    <div class="max-w-md w-full text-center animate__animated animate__fadeIn">
        <div class="text-8xl mb-4">🦅</div>
        <h1 class="text-4xl font-black text-slate-800 mb-2">هدهد برو</h1>
        <p class="text-slate-500 mb-10">إدارة مبيعات احترافية بلمسة واحدة</p>
        <button onclick="loginWithGoogle()" class="w-full flex items-center justify-center gap-4 bg-white border-2 border-slate-100 p-5 rounded-3xl shadow-xl font-bold">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="24"> دخول عبر Google
        </button>
    </div>
</div>

<div id="mainAppContainer" class="hidden opacity-0 transition-opacity duration-500">
    <header class="sticky top-0 z-40 bg-white/80 backdrop-blur-md border-b border-slate-100 px-4 py-3">
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="bg-amber-600 p-2 rounded-xl text-white font-black text-xl">H</div>
                <div>
                    <h2 id="userNameDisplay" class="font-black text-slate-800 text-sm">...</h2>
                    <span id="shiftStatus" class="text-[10px] font-bold">الوردية مغلقة ❌</span>
                </div>
            </div>
            <div class="flex gap-2">
                <button id="btnStartShift" onclick="startShift()" class="bg-emerald-500 text-white px-3 py-2 rounded-xl text-xs font-bold">فتح وردية 🔓</button>
                <button id="btnEndShift" onclick="endShift()" class="hidden bg-rose-500 text-white px-3 py-2 rounded-xl text-xs font-bold">إغلاق 🔒</button>
                <button onclick="logout()" class="p-2 bg-slate-100 rounded-xl">🚪</button>
            </div>
        </div>
    </header>

    <main class="max-w-5xl mx-auto px-4 pt-6">
        <div class="admin-only hidden grid grid-cols-2 lg:grid-cols-3 gap-4 mb-8">
            <div class="bg-slate-900 text-white p-5 rounded-[2rem] shadow-xl">
                <p class="text-xs text-slate-400 font-bold mb-1">الربح الصافي</p>
                <h3 id="statDailyProfit" class="text-2xl font-black text-emerald-400">0</h3>
            </div>
            <div class="bg-white p-5 rounded-[2rem] shadow-sm border-b-4 border-blue-500 text-center">
                <p class="text-xs text-slate-400 font-bold mb-1">المبيعات</p>
                <h3 id="statDailySales" class="text-2xl font-black text-slate-800">0</h3>
            </div>
        </div>

        <div class="flex p-1.5 bg-slate-200/50 rounded-2xl mb-8 gap-1 overflow-x-auto no-scrollbar">
            <button id="tabInv" onclick="switchTab('inv')" class="tab-btn tab-active px-6 py-3 rounded-xl font-bold text-xs whitespace-nowrap">📦 المخزن</button>
            <button id="tabPos" onclick="switchTab('pos')" class="tab-btn px-6 py-3 rounded-xl font-bold text-xs text-slate-500 whitespace-nowrap">🛒 البيع</button>
            <button id="tabDebt" onclick="switchTab('debt')" class="tab-btn px-6 py-3 rounded-xl font-bold text-xs text-slate-500 whitespace-nowrap">💳 الديون</button>
            <button id="tabAdmin" onclick="switchTab('admin')" class="admin-only hidden tab-btn px-6 py-3 rounded-xl font-bold text-xs text-rose-600">📊 الإدارة</button>
        </div>

        <section id="panelInv" class="space-y-4">
            <div class="flex gap-2">
                <input type="text" id="searchIn" placeholder="بحث بالاسم، باركود، أو تصنيف..." class="flex-1 p-4 rounded-3xl bg-white shadow-sm border-none outline-none focus:ring-2 focus:ring-amber-500">
                <button onclick="openModal('modalAdd')" class="admin-only hidden bg-slate-800 text-white px-8 rounded-3xl font-bold">إضافة ➕</button>
            </div>
            <div id="productsList" class="grid gap-3"></div>
        </section>

        <section id="panelPos" class="hidden space-y-4">
            <div class="bg-white p-6 rounded-[2.5rem] shadow-xl border border-amber-50">
                <div id="cartItems" class="space-y-3 min-h-[150px] mb-6"></div>
                <div class="border-t-2 border-dashed border-slate-100 pt-6">
                    <h2 id="cartTotal" class="text-4xl font-black text-amber-600 mb-6 text-center">0.00 دج</h2>
                    <div class="grid grid-cols-2 gap-3">
                        <button onclick="checkout(false)" class="bg-amber-600 text-white py-5 rounded-3xl font-black shadow-xl active:scale-95">بيع كاش ✅</button>
                        <button onclick="openModal('modalDebtName')" class="bg-rose-500 text-white py-5 rounded-3xl font-black shadow-xl active:scale-95">بيع كريدي 💳</button>
                    </div>
                </div>
            </div>
        </section>

        <section id="panelDebt" class="hidden space-y-4">
            <div id="debtList" class="grid gap-3"></div>
        </section>

        <section id="panelAdmin" class="hidden space-y-4">
            <div class="bg-white p-6 rounded-[2.5rem] shadow-sm">
                <h3 class="font-black text-xl mb-4">إدارة العمال</h3>
                <button onclick="addNewSeller()" class="bg-blue-600 text-white px-4 py-2 rounded-xl text-xs font-bold mb-4">+ إضافة بائع</button>
                <div id="staffList" class="space-y-2"></div>
            </div>
            <div class="bg-white p-6 rounded-[2.5rem] shadow-sm">
                <h3 class="font-black text-xl mb-4">نشاط الورديات</h3>
                <div id="shiftsHistory" class="space-y-2"></div>
            </div>
        </section>
    </main>
</div>

<div id="modalAdd" class="fixed inset-0 z-[100] bg-slate-900/60 backdrop-blur-sm hidden items-center justify-center p-4">
    <div class="bg-white w-full max-w-lg rounded-[2.5rem] p-8 animate__animated animate__zoomIn max-h-[90vh] overflow-y-auto">
        <h2 class="text-2xl font-black mb-6">إضافة منتج للسحابة</h2>
        <div class="space-y-4">
            <div>
                <label class="text-[10px] font-bold text-slate-400 mr-2 uppercase">التصنيف</label>
                <select id="inCategory" class="w-full p-4 bg-slate-50 rounded-2xl font-bold outline-none border-2 border-transparent focus:border-amber-500">
                    <option value="مواد غذائية">مواد غذائية</option>
                    <option value="تنظيف">تنظيف</option>
                    <option value="مشروبات">مشروبات</option>
                    <option value="خضر وفواكه">خضر وفواكه</option>
                    <option value="أخرى">أخرى...</option>
                </select>
            </div>
            <input type="text" id="inName" placeholder="اسم المنتج" class="w-full p-4 bg-slate-50 rounded-2xl outline-none font-bold">
            
            <div class="relative">
                <input type="text" id="inBarcode" placeholder="الباركود (Scan)" class="w-full p-4 bg-slate-50 rounded-2xl outline-none font-bold pr-16">
                <button onclick="scanBarcodeForInput()" class="absolute left-2 top-2 bottom-2 bg-amber-100 text-amber-600 px-4 rounded-xl font-bold">📷</button>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <input type="number" id="inPurchasePrice" placeholder="سعر الشراء" class="w-full p-4 bg-emerald-50 rounded-2xl outline-none font-bold text-emerald-700">
                <input type="number" id="inPrice" placeholder="سعر البيع" class="w-full p-4 bg-amber-50 rounded-2xl outline-none font-bold text-amber-700">
            </div>
            
            <div class="grid grid-cols-2 gap-4">
                <select id="inUnit" class="w-full p-4 bg-slate-50 rounded-2xl font-bold"><option value="قطعة">قطعة</option><option value="كغ">كيلو</option></select>
                <input type="number" id="inStock" placeholder="الكمية" class="w-full p-4 bg-slate-50 rounded-2xl outline-none font-bold">
            </div>
            
            <button onclick="saveProduct()" class="w-full bg-amber-600 text-white py-5 rounded-3xl font-black shadow-lg">حفظ المنتج 💾</button>
            <button onclick="closeModal('modalAdd')" class="w-full text-slate-400 font-bold">إلغاء</button>
        </div>
    </div>
</div>

<div id="modalQty" class="fixed inset-0 z-[300] bg-slate-900/90 hidden items-center justify-center p-6">
    <div class="bg-white p-8 rounded-[3rem] w-full max-w-xs text-center">
        <h3 id="qtyName" class="text-xl font-black mb-6"></h3>
        <input type="number" id="qtyInput" step="0.01" class="w-full text-center text-5xl font-black p-4 outline-none mb-8 border-b-4 border-amber-500">
        <button id="btnConfirmQty" class="w-full bg-amber-600 text-white py-5 rounded-3xl font-black">إضافة للسلة 🛒</button>
    </div>
</div>

<div id="modalScanner" class="fixed inset-0 z-[400] bg-black hidden flex-col p-6">
    <div class="flex justify-between text-white mb-6"><h2>ماسح الباركود</h2><button onclick="toggleScanner()" class="text-2xl">✕</button></div>
    <div id="reader"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, getDoc, setDoc, collection, onSnapshot, query, orderBy, addDoc, deleteDoc, updateDoc, serverTimestamp, where, increment } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAuECTMZfc3ode7iIxXEdz72My3hH_v5jE",
        authDomain: "hodhod-c4aa2.firebaseapp.com",
        projectId: "hodhod-c4aa2",
        storageBucket: "hodhod-c4aa2.firebasestorage.app",
        messagingSenderId: "579573823574",
        appId: "1:579573823574:web:106bd5ebe580f3b0ace3f7"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const provider = new GoogleAuthProvider();

    const ADMIN_EMAIL = "admin@example.com"; // ضع إيميلك هنا
    let user = null, products = [], cart = [], scanner = null, currentShiftId = null;

    onAuthStateChanged(auth, async (u) => {
        if (u) {
            user = u;
            document.getElementById('userNameDisplay').innerText = u.displayName;
            await checkAccess(u);
            syncData();
        } else {
            toggleUI(false);
        }
    });

    async function checkAccess(u) {
        const isAdmin = u.email === ADMIN_EMAIL;
        document.querySelectorAll('.admin-only').forEach(el => el.classList.toggle('hidden', !isAdmin));
        if (!isAdmin) {
            const staffSnap = await getDoc(doc(db, "stores", ADMIN_EMAIL, "staff", u.email));
            if (!staffSnap.exists()) { alert("غير مسجل كبائع!"); signOut(auth); return; }
        }
        toggleUI(true);
        currentShiftId = localStorage.getItem('currentShiftId');
        updateShiftUI();
    }

    function toggleUI(show) {
        document.getElementById('authOverlay').classList.toggle('hidden', show);
        document.getElementById('mainAppContainer').classList.toggle('hidden', !show);
        if(show) document.getElementById('mainAppContainer').classList.add('opacity-100');
    }

    function syncData() {
        onSnapshot(query(collection(db, "stores", ADMIN_EMAIL, "products"), orderBy("createdAt", "desc")), (snap) => {
            products = snap.docs.map(d => ({ id: d.id, ...d.data() }));
            renderProducts();
        });

        onSnapshot(query(collection(db, "stores", ADMIN_EMAIL, "debts"), where("status", "==", "unpaid")), (snap) => {
            renderDebts(snap.docs.map(d => ({ id: d.id, ...d.data() })));
        });

        if (user.email === ADMIN_EMAIL) {
            const startDay = new Date(); startDay.setHours(0,0,0,0);
            onSnapshot(query(collection(db, "stores", ADMIN_EMAIL, "sales"), where("date", ">", startDay.toISOString())), (snap) => {
                const sales = snap.docs.map(d => d.data());
                updateAdminStats(sales);
            });
            onSnapshot(collection(db, "stores", ADMIN_EMAIL, "staff"), (snap) => {
                renderStaff(snap.docs.map(d => d.data()));
            });
        }
    }

    // --- مسح الباركود عند الإضافة ---
    window.scanBarcodeForInput = () => {
        const m = document.getElementById('modalScanner');
        m.classList.remove('hidden');
        if (scanner) scanner.stop();
        scanner = new Html5Qrcode("reader");
        scanner.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (text) => {
            document.getElementById('inBarcode').value = text;
            toggleScanner();
        });
    };

    window.saveProduct = async () => {
        const data = {
            name: document.getElementById('inName').value,
            category: document.getElementById('inCategory').value,
            purchasePrice: parseFloat(document.getElementById('inPurchasePrice').value) || 0,
            price: parseFloat(document.getElementById('inPrice').value) || 0,
            stock: parseFloat(document.getElementById('inStock').value) || 0,
            unit: document.getElementById('inUnit').value,
            barcode: document.getElementById('inBarcode').value,
            createdAt: serverTimestamp()
        };
        await addDoc(collection(db, "stores", ADMIN_EMAIL, "products"), data);
        closeModal('modalAdd');
    };

    function renderProducts() {
        const q = document.getElementById('searchIn').value.toLowerCase();
        const filtered = products.filter(p => 
            p.name.toLowerCase().includes(q) || 
            (p.barcode && p.barcode.includes(q)) ||
            (p.category && p.category.includes(q))
        );
        document.getElementById('productsList').innerHTML = filtered.map(p => `
            <div onclick="handleProductClick('${p.id}')" class="bg-white p-5 flex justify-between rounded-3xl shadow-sm cursor-pointer hover:bg-amber-50 ${p.stock < 5 ? 'low-stock' : ''}">
                <div>
                    <span class="text-[9px] bg-slate-100 px-2 py-0.5 rounded-lg text-slate-500 font-bold">${p.category}</span>
                    <h4 class="font-bold text-slate-800 mt-1">${p.name}</h4>
                    <p class="text-xs font-bold text-amber-600">${p.price} دج</p>
                </div>
                <div class="text-left flex flex-col justify-center">
                    <p class="text-[8px] text-slate-400 font-bold uppercase">المخزون</p>
                    <p class="font-black ${p.stock < 5 ? 'text-rose-600' : 'text-slate-700'}">${p.stock} ${p.unit}</p>
                </div>
            </div>
        `).join('');
    }

    window.handleProductClick = (id) => {
        if(!currentShiftId && user.email !== ADMIN_EMAIL) return alert("افتح وردية أولاً!");
        const p = products.find(prod => prod.id === id);
        document.getElementById('qtyName').innerText = p.name;
        document.getElementById('qtyInput').value = p.unit === "قطعة" ? "1" : "";
        openModal('modalQty');
        document.getElementById('btnConfirmQty').onclick = () => {
            const qty = parseFloat(document.getElementById('qtyInput').value);
            if(qty > 0 && qty <= p.stock) {
                const exist = cart.find(i => i.id === p.id);
                if(exist) { exist.qty += qty; exist.subtotal = exist.qty * exist.price; }
                else { cart.push({ id: p.id, name: p.name, price: p.price, purchasePrice: p.purchasePrice, qty, subtotal: qty * p.price }); }
                renderCart(); switchTab('pos'); closeModal('modalQty');
            } else { alert("الكمية غير متوفرة!"); }
        };
    };

    window.checkout = async (isDebt) => {
        if(cart.length === 0) return;
        const total = cart.reduce((s, i) => s + i.subtotal, 0);
        const saleData = { total, items: cart, date: new Date().toISOString(), type: isDebt ? 'debt' : 'cash', seller: user.email };

        for(const item of cart) {
            await updateDoc(doc(db, "stores", ADMIN_EMAIL, "products", item.id), { stock: increment(-item.qty) });
        }

        if(isDebt) {
            const customer = document.getElementById('debtCustomerName').value;
            await addDoc(collection(db, "stores", ADMIN_EMAIL, "debts"), { ...saleData, customer, status: 'unpaid' });
        }
        await addDoc(collection(db, "stores", ADMIN_EMAIL, "sales"), saleData);
        if(currentShiftId && !isDebt) await updateDoc(doc(db, "stores", ADMIN_EMAIL, "shifts", currentShiftId), { totalSales: increment(total) });

        cart = []; renderCart(); closeModal('modalDebtName'); alert("تمت العملية! ✅");
    };

    // --- الوظائف المساعدة ---
    window.startShift = async () => {
        const bal = parseFloat(prompt("مبلغ البداية (الفراكة):", "0"));
        const ref = await addDoc(collection(db, "stores", ADMIN_EMAIL, "shifts"), {
            sellerName: user.displayName, startTime: new Date().toISOString(), openingBalance: bal, totalSales: 0, status: "open"
        });
        currentShiftId = ref.id; localStorage.setItem('currentShiftId', currentShiftId);
        updateShiftUI();
    };

    window.endShift = async () => {
        await updateDoc(doc(db, "stores", ADMIN_EMAIL, "shifts", currentShiftId), { status: "closed", endTime: new Date().toISOString() });
        currentShiftId = null; localStorage.removeItem('currentShiftId');
        updateShiftUI();
    };

    function updateShiftUI() {
        const isOpen = !!currentShiftId;
        document.getElementById('shiftStatus').innerText = isOpen ? "الوردية مفتوحة ✅" : "الوردية مغلقة ❌";
        document.getElementById('shiftStatus').classList.toggle('text-emerald-500', isOpen);
        document.getElementById('btnStartShift').classList.toggle('hidden', isOpen);
        document.getElementById('btnEndShift').classList.toggle('hidden', !isOpen);
    }

    function renderCart() {
        document.getElementById('cartItems').innerHTML = cart.map((i, idx) => `
            <div class="bg-slate-50 p-4 rounded-2xl flex justify-between items-center">
                <div><h5 class="font-bold text-sm">${i.name}</h5><p class="text-xs text-amber-600">${i.qty} × ${i.price}</p></div>
                <div class="flex items-center gap-3"><span class="font-black">${i.subtotal}</span><button onclick="cart.splice(${idx},1);renderCart()" class="text-rose-400">✕</button></div>
            </div>
        `).join('');
        document.getElementById('cartTotal').innerText = cart.reduce((s, i) => s + i.subtotal, 0).toLocaleString() + " دج";
    }

    function updateAdminStats(sales) {
        let rev = 0, profit = 0;
        sales.forEach(sl => {
            rev += sl.total;
            sl.items.forEach(i => { profit += (i.price - (i.purchasePrice || 0)) * i.qty; });
        });
        document.getElementById('statDailySales').innerText = rev.toLocaleString();
        document.getElementById('statDailyProfit').innerText = profit.toLocaleString();
    }

    window.switchTab = (t) => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('tab-active'));
        document.getElementById('tab' + t.charAt(0).toUpperCase() + t.slice(1)).classList.add('tab-active');
        ['inv','pos','debt','admin'].forEach(p => document.getElementById('panel' + p.charAt(0).toUpperCase() + p.slice(1))?.classList.toggle('hidden', p !== t));
    };

    window.openModal = (id) => document.getElementById(id).classList.replace('hidden', 'flex');
    window.closeModal = (id) => document.getElementById(id).classList.replace('flex', 'hidden');
    window.toggleScanner = () => {
        const m = document.getElementById('modalScanner');
        if (scanner) { m.classList.add('hidden'); scanner.stop(); scanner = null; }
        else {
            m.classList.remove('hidden');
            scanner = new Html5Qrcode("reader");
            scanner.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (t) => {
                const p = products.find(prod => prod.barcode === t);
                if(p) { handleProductClick(p.id); toggleScanner(); }
            });
        }
    };
    window.loginWithGoogle = () => signInWithPopup(auth, provider);
    window.logout = () => signOut(auth);
    document.getElementById('searchIn').oninput = renderProducts;
</script>
</body>
</html>

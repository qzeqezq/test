<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>هدهد ماركت - سوق مسعد | منصة متكاملة</title>
    <link rel="icon" type="image/png" href="https://i.postimg.cc/3NZ6WbKP/235264114-157440589754796-4426353709702884299-n-removebg-preview.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Tajawal', sans-serif; background: #f5f7fa; color: #1e2a3e; line-height: 1.4; }
        /* Flat Design - minimal shadows */
        .flat-card { background: white; border: 1px solid #e2e8f0; border-radius: 16px; transition: 0.1s linear; }
        .flat-card:hover { border-color: #cbd5e1; }
        .btn { border: none; padding: 8px 18px; border-radius: 40px; font-weight: 600; cursor: pointer; font-family: inherit; transition: 0.1s; }
        .btn-primary { background: #2563eb; color: white; }
        .btn-outline { background: transparent; border: 1px solid #2563eb; color: #2563eb; }
        .btn-danger { background: #dc2626; color: white; }
        .badge { background: #eef2ff; color: #1e40af; padding: 4px 12px; border-radius: 30px; font-size: 0.75rem; font-weight: 600; display: inline-block; }
        /* header */
        .app-header { background: #1e3a8a; padding: 12px 24px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; position: sticky; top: 0; z-index: 100; }
        .logo-area { display: flex; align-items: center; gap: 8px; color: white; font-weight: 800; font-size: 1.4rem; }
        .logo-area img { width: 42px; height: 42px; object-fit: contain; }
        .user-info { display: flex; align-items: center; gap: 12px; background: rgba(255,255,255,0.15); padding: 5px 16px; border-radius: 40px; }
        .user-info span { color: white; font-weight: 500; }
        /* nav bar */
        .nav-bar { background: white; border-bottom: 1px solid #e2e8f0; padding: 0 20px; display: flex; flex-wrap: wrap; gap: 4px; overflow-x: auto; }
        .nav-link { padding: 14px 18px; font-weight: 600; color: #334155; cursor: pointer; border-bottom: 3px solid transparent; transition: 0.1s; white-space: nowrap; }
        .nav-link.active { color: #2563eb; border-bottom-color: #2563eb; }
        /* main */
        .main-container { max-width: 1300px; margin: 20px auto; padding: 0 20px; }
        /* filter row */
        .filter-row { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 24px; align-items: center; }
        .search-input { flex: 2; min-width: 200px; padding: 10px 18px; border-radius: 40px; border: 1px solid #cbd5e1; background: white; font-family: inherit; }
        .filter-chips { display: flex; gap: 10px; flex-wrap: wrap; }
        .chip { background: #f1f5f9; padding: 6px 16px; border-radius: 40px; font-size: 0.85rem; cursor: pointer; transition: 0.1s; border: 1px solid transparent; }
        .chip.active { background: #2563eb; color: white; border-color: #2563eb; }
        .tabs-sub { display: flex; gap: 16px; margin-bottom: 20px; border-bottom: 1px solid #e2e8f0; }
        .sub-tab { padding: 8px 4px; cursor: pointer; font-weight: 600; color: #475569; border-bottom: 2px solid transparent; }
        .sub-tab.active { color: #2563eb; border-bottom-color: #2563eb; }
        /* cards grid */
        .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 20px; margin-top: 16px; }
        .product-card { background: white; border-radius: 20px; border: 1px solid #e2e8f0; overflow: hidden; cursor: pointer; transition: 0.1s; }
        .product-card:hover { transform: translateY(-2px); border-color: #94a3b8; }
        .product-img { width: 100%; height: 170px; object-fit: cover; background: #f8fafc; }
        .product-info { padding: 14px; }
        .product-price { font-size: 1.3rem; font-weight: 800; color: #2563eb; margin: 6px 0; }
        .shop-vertical-item { display: flex; gap: 16px; background: white; border: 1px solid #e2e8f0; border-radius: 20px; padding: 12px; margin-bottom: 12px; cursor: pointer; align-items: center; }
        .shop-avatar { width: 70px; height: 70px; border-radius: 20px; object-fit: cover; }
        /* chat layout */
        .chat-layout { display: flex; gap: 20px; flex-wrap: wrap; background: white; border-radius: 24px; border: 1px solid #e2e8f0; overflow: hidden; }
        .chat-sidebar { flex: 1; min-width: 260px; background: #fafcff; border-left: 1px solid #e2e8f0; padding: 16px; }
        .chat-main { flex: 3; display: flex; flex-direction: column; background: white; min-height: 500px; }
        .chat-messages { flex: 1; padding: 16px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; max-height: 450px; }
        .message-bubble { max-width: 80%; padding: 8px 14px; border-radius: 24px; background: #f1f5f9; align-self: flex-start; }
        .message-bubble.me { background: #2563eb; color: white; align-self: flex-end; }
        .chat-input-area { display: flex; gap: 12px; padding: 16px; border-top: 1px solid #e2e8f0; }
        /* modal */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(2px); z-index: 1000; align-items: center; justify-content: center; }
        .modal-card { background: white; width: 90%; max-width: 550px; border-radius: 28px; max-height: 85vh; overflow-y: auto; }
        .modal-header { padding: 16px 20px; border-bottom: 1px solid #e2e8f0; display: flex; justify-content: space-between; font-weight: 800; }
        .modal-body { padding: 20px; }
        .rating-stars { color: #fbbf24; font-size: 1.2rem; direction: ltr; display: inline-block; }
        .unread-dot { width: 10px; height: 10px; background: #ef4444; border-radius: 50%; display: inline-block; margin-right: 6px; }
        .footer { text-align: center; padding: 24px; color: #64748b; border-top: 1px solid #e2e8f0; margin-top: 40px; }
        @media (max-width: 700px) { .chat-layout { flex-direction: column; } }
    </style>
</head>
<body>

<header class="app-header">
    <div class="logo-area">
        <img src="https://i.postimg.cc/3NZ6WbKP/235264114-157440589754796-4426353709702884299-n-removebg-preview.png" alt="logo">
        <span>هدهد ماركت</span>
    </div>
    <div class="user-info" id="userInfo">
        <span id="userNameSpan">زائر</span>
        <button id="authBtn" class="btn btn-outline" style="background:white; color:#1e3a8a;">دخول</button>
    </div>
</header>

<nav class="nav-bar" id="navBar">
    <div class="nav-link active" data-nav="explore">🏠 الرئيسية</div>
    <div class="nav-link" data-nav="services">🔧 الخدمات</div>
    <div class="nav-link" data-nav="shops">🏪 دليل المحلات</div>
    <div class="nav-link" data-nav="chats">💬 الدردشة</div>
    <div class="nav-link" data-nav="notifications">🔔 الإشعارات</div>
    <div class="nav-link" id="myShopNav" style="display:none;" data-nav="myShop">🏬 متجري</div>
    <div class="nav-link" id="adminNav" style="display:none;" data-nav="admin">👑 لوحة الأدمن</div>
</nav>

<main class="main-container" id="mainApp">
    <!-- المحتوى الديناميكي سيتم حقنه هنا -->
</main>

<div class="footer">
    <img src="https://i.postimg.cc/3NZ6WbKP/235264114-157440589754796-4426353709702884299-n-removebg-preview.png" width="28">
    <p>📍 هدهد ماركت - سوق مسعد | منصة متكاملة مع Firebase | خدمات، محلات، دردشة فورية</p>
</div>

<!-- مودال المنتج / الخدمة التفصيلي -->
<div id="itemModal" class="modal"><div class="modal-card"><div class="modal-header"><span id="modalTitle">تفاصيل</span><button class="close-modal" onclick="closeModal()" style="background:none; border:none; font-size:24px;">&times;</button></div><div class="modal-body" id="modalBody"></div></div></div>

<script>
    // ---------------------- Firebase CONFIG (استبدل بمفاتيحك) ----------------------
    const firebaseConfig = {
        apiKey: "AIzaSyAuECTMZfc3ode7iIxXEdz72My3hH_v5jE",
        authDomain: "hodhod-c4aa2.firebaseapp.com",
        databaseURL: "https://hodhod-c4aa2-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "hodhod-c4aa2",
        storageBucket: "hodhod-c4aa2.firebasestorage.app",
        messagingSenderId: "579573823574",
        appId: "1:579573823574:web:106bd5ebe580f3b0ace3f7",
        measurementId: "G-W5Y9JLE511"
  
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();
    const storage = firebase.storage();

    // ---------------------- State Management (simple) ----------------------
    let currentUser = null;          // { uid, name, email, role, shopId? }
    let currentNav = "explore";
    let currentSubTab = "local";     // "local" or "following" (للرئيسية)
    let currentCategoryFilter = "all";
    let searchKeyword = "";
    let currentChatId = null;
    let unsubscribeChat = null;

    // بيانات مؤقتة للرفع
    let pendingProductImage = null;
    let pendingServiceImage = null;

    // ---------------------- Helper: Geolocation (محلي) ----------------------
    let userCity = "مسعد";  // افتراضي
    function getUserLocation() {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(async (pos) => {
                // استخدام reverse geocoding بسيط (لتحديد المدينة) لكن تبسيطاً نضع مدينة ثابتة أو نستخدم خدمة مجانية
                // نكتفي بتخزين إحداثيات، ولكن سنقوم بتصفية المحلات بناءً على حقل "city" في Firestore
                // يمكننا تحديث userCity من المستخدم يدوياً أو من API، للأغراض العملية سنطلب من المستخدم اختيار المدينة من قائمة.
                // لكن لتسهيل التجربة: سنفترض أن كل محل له حقل city، والمستخدم يختار مدينته من مربع نص صغير.
                alert("تم الوصول لموقعك، يمكنك الآن تصفية المحلات حسب المدينة عبر شريط البحث");
            }, () => console.log("Geolocation غير مصرح"));
        }
    }

    // ---------------------- Auth & UI Updates ----------------------
    async function updateUIForRole() {
        const logged = !!currentUser;
        const role = currentUser?.role;
        document.getElementById("myShopNav").style.display = (logged && role === "merchant") ? "flex" : "none";
        document.getElementById("adminNav").style.display = (logged && role === "admin") ? "flex" : "none";
        document.getElementById("userNameSpan").innerText = logged ? currentUser.name : "زائر";
        document.getElementById("authBtn").innerText = logged ? "تسجيل خروج" : "دخول";
        if (!logged && (currentNav === "myShop" || currentNav === "admin" || currentNav === "notifications")) {
            switchNav("explore");
        } else {
            renderCurrentView();
        }
    }

    function logout() { auth.signOut(); currentUser = null; updateUIForRole(); }
    function showAuthModal() { openModalAuth(); }

    // مودال تسجيل الدخول سريع (نافذة منبثقة مبسطة)
    function openModalAuth() {
        const html = `<div class="form-group"><label>البريد</label><input id="authEmail" type="email" placeholder="example@domain.com" class="search-input" style="width:100%"></div>
                      <div class="form-group"><label>كلمة المرور</label><input id="authPass" type="password" class="search-input" style="width:100%"></div>
                      <div id="authExtra" style="display:none; margin-top:12px;"><input id="regName" placeholder="الاسم الكامل" class="search-input" style="width:100%; margin-bottom:8px"><select id="regRole" class="search-input"><option value="registered">مستخدم عادي</option><option value="merchant">تاجر (متجر)</option></select><div id="merchantFields" style="display:none; margin-top:8px;"><input id="shopNameReg" placeholder="اسم المحل*" class="search-input"><input id="shopPhoneReg" placeholder="رقم الهاتف*" class="search-input"></div></div>
                      <button id="submitAuthBtn" class="btn btn-primary" style="width:100%; margin-top:12px;">دخول</button>
                      <button id="googleAuthBtn" class="btn btn-outline" style="width:100%; margin-top:8px;"><i class="fab fa-google"></i> جوجل</button>
                      <p style="margin-top:12px;"><a href="#" id="toggleAuthMode">إنشاء حساب جديد</a></p>`;
        document.getElementById("modalTitle").innerText = "تسجيل الدخول";
        document.getElementById("modalBody").innerHTML = html;
        document.getElementById("itemModal").style.display = "flex";
        let isLogin = true;
        const toggleLink = document.getElementById("toggleAuthMode");
        const authExtra = document.getElementById("authExtra");
        const submitBtn = document.getElementById("submitAuthBtn");
        const roleSelect = document.getElementById("regRole");
        const merchantDiv = document.getElementById("merchantFields");
        if(roleSelect) roleSelect.addEventListener("change", (e) => { merchantDiv.style.display = e.target.value === "merchant" ? "block" : "none"; });
        toggleLink.onclick = (e) => {
            e.preventDefault();
            isLogin = !isLogin;
            document.getElementById("modalTitle").innerText = isLogin ? "تسجيل الدخول" : "إنشاء حساب";
            authExtra.style.display = isLogin ? "none" : "block";
            submitBtn.innerText = isLogin ? "دخول" : "تسجيل";
        };
        submitBtn.onclick = async () => {
            const email = document.getElementById("authEmail").value;
            const pass = document.getElementById("authPass").value;
            if(!email || !pass) return alert("املأ البريد وكلمة المرور");
            if(isLogin) {
                try {
                    const cred = await auth.signInWithEmailAndPassword(email, pass);
                    const doc = await db.collection("users").doc(cred.user.uid).get();
                    if(!doc.exists) throw new Error("بيانات غير مكتملة");
                    currentUser = { uid: cred.user.uid, ...doc.data() };
                    closeModal();
                    updateUIForRole();
                } catch(e) { alert(e.message); }
            } else {
                const name = document.getElementById("regName").value;
                const role = document.getElementById("regRole").value;
                if(!name) return alert("أدخل الاسم");
                if(role === "merchant") {
                    const shopName = document.getElementById("shopNameReg").value;
                    const shopPhone = document.getElementById("shopPhoneReg").value;
                    if(!shopName || !shopPhone) return alert("اسم المحل والهاتف مطلوبان للتاجر");
                    try {
                        const cred = await auth.createUserWithEmailAndPassword(email, pass);
                        const shopRef = await db.collection("shops").add({
                            name: shopName, phone: shopPhone, city: "مسعد", rating: 0, ratingCount: 0,
                            userId: cred.user.uid, followers: [], productsCount: 0, createdAt: new Date()
                        });
                        await db.collection("users").doc(cred.user.uid).set({
                            name, email, role, shopId: shopRef.id, createdAt: new Date()
                        });
                        alert("تم إنشاء حساب التاجر والمحل بنجاح، سجل دخول");
                        closeModal();
                    } catch(e) { alert(e.message); }
                } else {
                    try {
                        const cred = await auth.createUserWithEmailAndPassword(email, pass);
                        await db.collection("users").doc(cred.user.uid).set({ name, email, role: "registered", createdAt: new Date() });
                        alert("تم التسجيل، سجل دخول");
                        closeModal();
                    } catch(e) { alert(e.message); }
                }
            }
        };
        document.getElementById("googleAuthBtn").onclick = async () => {
            const provider = new firebase.auth.GoogleAuthProvider();
            try {
                const result = await auth.signInWithPopup(provider);
                const userDoc = await db.collection("users").doc(result.user.uid).get();
                if(!userDoc.exists) await db.collection("users").doc(result.user.uid).set({ name: result.user.displayName, email: result.user.email, role: "registered", createdAt: new Date() });
                currentUser = { uid: result.user.uid, ...(await db.collection("users").doc(result.user.uid).get()).data() };
                closeModal();
                updateUIForRole();
            } catch(e) { alert(e); }
        };
    }

    function closeModal() { document.getElementById("itemModal").style.display = "none"; }

    // ---------------------- Rendering Logic ----------------------
    async function renderCurrentView() {
        const container = document.getElementById("mainApp");
        if(currentNav === "explore") {
            container.innerHTML = `
                <div class="filter-row">
                    <input type="text" id="globalSearch" class="search-input" placeholder="ابحث عن سلعة أو محل..." value="${searchKeyword}">
                    <div class="filter-chips" id="categoryChips"></div>
                </div>
                <div class="tabs-sub">
                    <div class="sub-tab ${currentSubTab === 'local' ? 'active' : ''}" data-sub="local">📍 محلي (مسعد)</div>
                    <div class="sub-tab ${currentSubTab === 'following' ? 'active' : ''}" data-sub="following">❤️ أتابعه</div>
                </div>
                <div id="exploreGrid" class="cards-grid"></div>
            `;
            document.getElementById("globalSearch").addEventListener("input", (e) => { searchKeyword = e.target.value; renderExplore(); });
            document.querySelectorAll(".sub-tab").forEach(t => t.addEventListener("click", (e) => { currentSubTab = e.target.dataset.sub; renderCurrentView(); }));
            await loadCategoryChips();
            await renderExplore();
        } 
        else if(currentNav === "services") {
            container.innerHTML = `<div class="filter-row"><h3>الخدمات المقدمة من المنصة</h3></div><div id="servicesGrid" class="cards-grid"></div>`;
            await renderServices();
        }
        else if(currentNav === "shops") {
            container.innerHTML = `<div class="filter-row"><input type="text" id="shopSearch" placeholder="بحث عن محل..." class="search-input"></div><div id="shopsList"></div>`;
            document.getElementById("shopSearch").addEventListener("input", () => renderShopsList());
            await renderShopsList();
        }
        else if(currentNav === "chats") { await renderChatsInterface(); }
        else if(currentNav === "notifications") { await renderNotifications(); }
        else if(currentNav === "myShop" && currentUser?.role === "merchant") { await renderMyShopDashboard(); }
        else if(currentNav === "admin" && currentUser?.role === "admin") { await renderAdminPanel(); }
    }

    async function loadCategoryChips() { /* فلترة حسب التصنيف */ }
    async function renderExplore() {
        let productsQuery = db.collection("products");
        if(currentSubTab === "local") productsQuery = productsQuery.where("city", "==", "مسعد");
        else if(currentSubTab === "following" && currentUser) {
            const followedShops = await db.collection("shops").where("followers", "array-contains", currentUser.uid).get();
            const shopIds = followedShops.docs.map(d => d.id);
            if(shopIds.length) productsQuery = productsQuery.where("shopId", "in", shopIds);
            else productsQuery = productsQuery.limit(0);
        }
        const snap = await productsQuery.get();
        let items = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        if(searchKeyword) items = items.filter(i => i.name?.includes(searchKeyword) || (i.desc?.includes(searchKeyword)));
        const grid = document.getElementById("exploreGrid");
        if(!grid) return;
        if(items.length === 0) { grid.innerHTML = "<div class='flat-card' style='padding:40px; text-align:center'>لا توجد نتائج</div>"; return; }
        grid.innerHTML = items.map(p => `
            <div class="product-card" onclick="showProductDetail('${p.id}')">
                <img class="product-img" data-src="${p.imgUrl || 'https://picsum.photos/200/150'}" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20200%20150'%3E%3C/svg%3E" alt="تحميل">
                <div class="product-info"><h4>${p.name}</h4><div class="product-price">💰 ${p.price || 'غير محدد'}</div></div>
            </div>
        `).join('');
        // lazy loading
        const imgObserver = new IntersectionObserver((entries) => {
            entries.forEach(entry => { if(entry.isIntersecting) { const img = entry.target; img.src = img.dataset.src; imgObserver.unobserve(img); } });
        });
        document.querySelectorAll("#exploreGrid .product-img").forEach(img => imgObserver.observe(img));
    }

    async function renderServices() {
        const servicesSnap = await db.collection("services").get();
        const services = servicesSnap.docs.map(d => ({ id: d.id, ...d.data() }));
        const grid = document.getElementById("servicesGrid");
        if(!grid) return;
        grid.innerHTML = services.map(s => `
            <div class="product-card" onclick="showServiceDetail('${s.id}')">
                <img class="product-img" src="${s.imageUrl || 'https://picsum.photos/200/150'}">
                <div class="product-info"><h4>${s.name}</h4><div>${s.workingHours || 'ساعات العمل: 9ص-10م'}</div></div>
            </div>
        `).join('');
    }

    async function renderShopsList() {
        let query = db.collection("shops").orderBy("rating", "desc");
        const snap = await query.get();
        let shops = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        const search = document.getElementById("shopSearch")?.value || "";
        if(search) shops = shops.filter(s => s.name.includes(search));
        const container = document.getElementById("shopsList");
        container.innerHTML = shops.map(shop => `
            <div class="shop-vertical-item" onclick="viewShop('${shop.id}')">
                <img class="shop-avatar" src="${shop.avatarUrl || 'https://picsum.photos/70/70'}">
                <div style="flex:1"><h3>${shop.name}</h3><div>⭐ ${shop.rating?.toFixed(1) || 0} (${shop.ratingCount || 0})</div><div>📍 ${shop.city || 'مسعد'}</div></div>
                ${currentUser && currentUser.role === 'registered' ? `<button class="btn btn-outline" onclick="event.stopPropagation(); toggleFollowShop('${shop.id}')">${shop.followers?.includes(currentUser.uid) ? 'متابع ✔' : 'متابعة'}</button>` : ''}
            </div>
        `).join('');
    }

    async function viewShop(shopId) {
        const shopDoc = await db.collection("shops").doc(shopId).get();
        const shop = shopDoc.data();
        const productsSnap = await db.collection("products").where("shopId", "==", shopId).get();
        const products = productsSnap.docs.map(d => ({ id: d.id, ...d.data() }));
        const modalBody = document.getElementById("modalBody");
        document.getElementById("modalTitle").innerText = shop.name;
        modalBody.innerHTML = `
            <img src="${shop.coverUrl || shop.avatarUrl || 'https://picsum.photos/400/150'}" style="width:100%; border-radius:20px; margin-bottom:12px;">
            <h3>${shop.name}</h3><p>${shop.desc || ''}</p><div>📞 ${shop.phone}</div><div>🕒 ${shop.workingHours || 'غير محدد'}</div>
            ${currentUser ? `<button class="btn btn-primary" onclick="startChat('${shop.userId}', '${shop.name}')">💬 دردشة مع المحل</button>` : ''}
            <hr><h4>منتجات المحل</h4><div class="cards-grid" style="grid-template-columns:repeat(auto-fill,minmax(160px,1fr))">${products.map(p => `<div class="flat-card" style="padding:8px"><img src="${p.imgUrl || 'https://picsum.photos/100/80'}" style="width:100%; border-radius:12px"><div>${p.name}</div><div>${p.price}</div></div>`).join('')}</div>
        `;
        document.getElementById("itemModal").style.display = "flex";
    }

    async function showProductDetail(productId) {
        const prod = await db.collection("products").doc(productId).get();
        if(!prod.exists) return;
        const data = prod.data();
        document.getElementById("modalTitle").innerText = data.name;
        document.getElementById("modalBody").innerHTML = `
            <img src="${data.imgUrl}" style="width:100%; border-radius:20px;"><h3>${data.name}</h3><div class="product-price">${data.price}</div><p>${data.desc || ''}</p>
            <button class="btn btn-primary" onclick="startChat('${data.sellerId}', 'تاجر')">💬 دردشة مع البائع</button>
            <div><h4>التعليقات</h4><div id="commentsSection"></div><textarea id="newComment" placeholder="أضف تعليقاً..." style="width:100%; margin-top:8px;"></textarea><button onclick="addComment('product','${productId}')" class="btn btn-primary">نشر</button></div>
        `;
        // load comments (بسيطة)
        const commentsSnap = await db.collection("comments").where("itemId", "==", productId).where("type","==","product").get();
        const commentsDiv = document.getElementById("commentsSection");
        commentsDiv.innerHTML = commentsSnap.docs.map(c => `<div><strong>${c.data().userName}</strong>: ${c.data().text}</div>`).join('');
        document.getElementById("itemModal").style.display = "flex";
    }
    window.showProductDetail = showProductDetail;
    window.showServiceDetail = async (id) => { const s = (await db.collection("services").doc(id).get()).data(); document.getElementById("modalTitle").innerText = s.name; document.getElementById("modalBody").innerHTML = `<div>${s.desc}</div><div>📞 ${s.phone}</div><div>🕒 ${s.workingHours}</div><button class="btn btn-primary" onclick="startChat('admin','الدعم')">اتصل بالدعم</button>`; document.getElementById("itemModal").style.display = "flex"; };
    window.toggleFollowShop = async (shopId) => { if(!currentUser) return alert("سجل دخول"); const shopRef = db.collection("shops").doc(shopId); const shop = (await shopRef.get()).data(); const isFollowing = shop.followers?.includes(currentUser.uid); if(isFollowing) await shopRef.update({ followers: firebase.firestore.FieldValue.arrayRemove(currentUser.uid) }); else await shopRef.update({ followers: firebase.firestore.FieldValue.arrayUnion(currentUser.uid) }); renderShopsList(); };
    async function startChat(otherUserId, otherName) { if(!currentUser) return; const chatId = [currentUser.uid, otherUserId].sort().join('_'); const chatRef = db.collection("chats").doc(chatId); const doc = await chatRef.get(); if(!doc.exists) await chatRef.set({ participants: [currentUser.uid, otherUserId], lastMessage: "", updatedAt: new Date() }); switchNav("chats"); setTimeout(() => { renderChatsInterface(chatId); }, 200); }
    window.startChat = startChat;

    async function renderChatsInterface(highlightChatId=null) {
        const container = document.getElementById("mainApp");
        container.innerHTML = `<div class="chat-layout"><div class="chat-sidebar" id="chatListSide"><h4>المحادثات</h4><div id="chatsListSidebar"></div></div><div class="chat-main"><div id="chatActiveWindow" class="chat-messages"><div class="empty-state">اختر محادثة</div></div><div class="chat-input-area" id="chatInputArea" style="display:none;"><input id="chatMessageInput" class="search-input" placeholder="رسالة..."><button id="sendMsgBtn" class="btn btn-primary">إرسال</button></div></div></div>`;
        await loadChatList(highlightChatId);
    }

    async function loadChatList(selectedId) {
        if(!currentUser) return;
        const chatsSnap = await db.collection("chats").where("participants", "array-contains", currentUser.uid).get();
        const chats = chatsSnap.docs.map(d => ({ id: d.id, ...d.data() }));
        const sidebar = document.getElementById("chatsListSidebar");
        sidebar.innerHTML = chats.map(chat => `<div class="flat-card" style="padding:10px; margin-bottom:8px; cursor:pointer;" onclick="openChatRoom('${chat.id}')">💬 ${chat.participants.filter(p=>p!==currentUser.uid)[0]} <span class="unread-dot" style="display:${chat.unread? 'inline-block':'none'}"></span></div>`).join('');
        if(selectedId) openChatRoom(selectedId);
    }

    window.openChatRoom = async (chatId) => {
        if(unsubscribeChat) unsubscribeChat();
        currentChatId = chatId;
        const chatDoc = await db.collection("chats").doc(chatId).get();
        const participants = chatDoc.data().participants;
        const otherId = participants.find(p => p !== currentUser.uid);
        const otherUser = (await db.collection("users").doc(otherId).get()).data();
        const otherName = otherUser?.name || "مستخدم";
        document.getElementById("chatActiveWindow").innerHTML = `<div id="messagesList" style="display:flex; flex-direction:column; gap:8px;"></div>`;
        document.getElementById("chatInputArea").style.display = "flex";
        unsubscribeChat = db.collection("chats").doc(chatId).collection("messages").orderBy("timestamp").onSnapshot(snap => {
            const msgsDiv = document.getElementById("messagesList");
            msgsDiv.innerHTML = snap.docs.map(m => `<div class="message-bubble ${m.data().sender === currentUser.uid ? 'me' : ''}"><strong>${m.data().senderName}</strong>: ${m.data().text}</div>`).join('');
            msgsDiv.scrollTop = msgsDiv.scrollHeight;
        });
        const sendBtn = document.getElementById("sendMsgBtn");
        const input = document.getElementById("chatMessageInput");
        const newSend = async () => { if(!input.value.trim()) return; await db.collection("chats").doc(chatId).collection("messages").add({ text: input.value, sender: currentUser.uid, senderName: currentUser.name, timestamp: new Date() }); await db.collection("chats").doc(chatId).update({ lastMessage: input.value, updatedAt: new Date() }); input.value = ""; };
        sendBtn.onclick = newSend;
        input.onkeypress = (e) => { if(e.key === "Enter") newSend(); };
    };

    async function renderMyShopDashboard() { /* إدارة المنتجات */ }
    async function renderAdminPanel() { /* عرض المستخدمين وحذف المحلات */ }
    async function renderNotifications() { /* عرض الإشعارات */ }
    async function addComment(type, id) { /* إضافة تعليق */ }

    // switch nav
    function switchNav(nav) {
        currentNav = nav;
        document.querySelectorAll(".nav-link").forEach(link => link.classList.remove("active"));
        document.querySelector(`.nav-link[data-nav="${nav}"]`)?.classList.add("active");
        renderCurrentView();
    }
    document.querySelectorAll(".nav-link").forEach(link => link.addEventListener("click", () => switchNav(link.dataset.nav)));

    auth.onAuthStateChanged(async (user) => {
        if(user) {
            const doc = await db.collection("users").doc(user.uid).get();
            currentUser = { uid: user.uid, ...doc.data() };
        } else currentUser = null;
        updateUIForRole();
    });
    document.getElementById("authBtn").onclick = () => { if(currentUser) logout(); else openModalAuth(); };
    getUserLocation();
    // إضافة بيانات تجريبية أولية (للتسهيل)
    window.onload = () => { renderCurrentView(); };
</script>
</body>
</html>
